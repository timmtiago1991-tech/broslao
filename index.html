<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#F4F1E9" />
<title>BROS.lão · Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- React + Babel -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
:root{
  --night:#F1F3F6; --surface:#FFFFFF; --surface-2:#F6F7F9; --line:#E6E8EC;
  --chalk:#1F2533; --muted:#6B7280; --muted-2:#9AA1AD;
  --canarinho:#F2B705; --canarinho-deep:#D89E00; --green:#16A34A;
  --celeste:#2E86C7; --celeste-deep:#1F6FA8;
  --live:#E5484D; --gold:#D89E00;
  --redlao:#D7263D; --dotblack:#16181D;
  --blue:#2563EB; --blue-deep:#1D4ED8; --blue-soft:#EAF1FE; --amber:#D97706;
  --r:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--night);
  color:var(--chalk);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
#root{max-width:1200px;margin:0 auto;padding:0 24px 64px}
h1,h2,h3,.disp{font-family:'Archivo',sans-serif;letter-spacing:-.01em}

/* desktop layout helpers */
.matchgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.matchgrid .match{margin-bottom:0}
.groupsec{margin-bottom:26px}
.group-h{display:flex;align-items:center;gap:10px;margin:24px 2px 12px}
.group-h .gtag{font-family:'Archivo';font-weight:900;font-size:15px;color:#1a1300;background:var(--canarinho);
  width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.group-h h3{margin:0;font-size:14px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800}
.group-h .teams{font-size:12px;color:var(--muted-2);margin-left:auto;font-weight:600}
.narrow{max-width:780px;margin:0 auto}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:760px){
  #root{padding:0 14px 90px}
  .cols{grid-template-columns:1fr}
  .matchgrid{grid-template-columns:1fr}
}
.num{font-variant-numeric:tabular-nums;font-family:'Archivo',sans-serif}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
a{color:var(--celeste)}

/* ---------- Top bar + nav ---------- */
.topbar{position:sticky;top:0;z-index:30;background:var(--surface);
  border-bottom:2px solid transparent;border-image:linear-gradient(90deg,var(--green),var(--canarinho),var(--blue)) 1;
  padding:12px 0;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:center;gap:8px;font-family:'Archivo';font-weight:900;font-size:22px;line-height:1;margin-right:10px}
.brand .logo{width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex:none}
.brand .wm{display:flex;align-items:baseline;gap:1px}
.brand .b1{color:var(--chalk)} .brand .dot{color:var(--dotblack)} .brand .b2{color:var(--redlao)}
.chip.wc{background:linear-gradient(95deg,#0E8C46,#12a655);color:#fff;border:none;display:inline-flex;align-items:center;gap:5px}
.topbar .spacer{flex:1}
.nav{display:flex;gap:4px}
.navlink{background:none;border:none;color:var(--muted);font-weight:700;font-size:14px;padding:9px 14px;border-radius:10px;display:flex;align-items:center;gap:7px}
.navlink:hover{color:var(--chalk);background:var(--surface-2)}
.navlink.active{color:#fff;background:var(--blue)}
.navlink.active:hover{background:var(--blue-deep)}
.navlink .ti{font-size:15px}
.chip{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:5px 9px;border-radius:99px;
  border:1px solid var(--line);color:var(--muted);background:var(--surface)}
.iconbtn{background:var(--surface);border:1px solid var(--line);color:var(--chalk);border-radius:10px;padding:8px 11px;font-size:13px;font-weight:600}
@media(max-width:760px){
  .topbar{flex-wrap:wrap;gap:8px;padding:12px 0}
  .nav{order:3;width:100%;justify-content:space-between}
  .navlink{flex:1;justify-content:center;padding:9px 4px;font-size:12px}
}

/* ---------- Layout ---------- */
.wrap{padding:18px 0 40px}
.sect-h{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 10px}
.sect-h:first-child{margin-top:8px}
.sect-h h2{font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800;margin:0}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 2px rgba(20,20,20,.04)}
.empty{border:1px dashed var(--line);border-radius:var(--r);padding:26px 18px;text-align:center;color:var(--muted);font-size:14px}

/* ---------- Match / Scoreboard card ---------- */
.match{background:linear-gradient(180deg,var(--surface),var(--surface-2));border:1px solid var(--line);
  border-radius:var(--r);padding:13px 14px;margin-bottom:10px;position:relative;overflow:hidden;box-shadow:0 1px 2px rgba(20,20,20,.04)}
.match.live{border-color:rgba(255,93,93,.45);box-shadow:0 0 0 1px rgba(255,93,93,.25)}
.match-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.phase-tag{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--canarinho)}
.phase-tag .x{color:var(--muted)}
.status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--muted)}
.status .d{width:7px;height:7px;border-radius:99px;background:var(--muted-2)}
.status.open{color:var(--green)} .status.open .d{background:var(--green)}
.status.soon{color:var(--canarinho)} .status.soon .d{background:var(--canarinho)}
.status.locked{color:var(--muted)} .status.locked .d{background:var(--muted-2)}
.status.live{color:var(--live)} .status.live .d{background:var(--live);animation:pulse 1.1s infinite}
.status.done{color:var(--celeste)} .status.done .d{background:var(--celeste)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,93,93,.6)}70%{box-shadow:0 0 0 7px rgba(255,93,93,0)}100%{box-shadow:0 0 0 0 rgba(255,93,93,0)}}
.scoreline{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.team{display:flex;align-items:center;gap:9px;min-width:0}
.team.right{flex-direction:row-reverse;text-align:right}
.team .nm{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.flag{width:30px;height:22px;border-radius:4px;flex:none;background:var(--surface-2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden}
.center{display:flex;align-items:center;gap:7px}
.scorebox{width:46px;height:52px;border-radius:10px;background:#FAF8F2;border:1px solid var(--line);
  color:var(--chalk);font-size:26px;font-weight:900;text-align:center;font-family:'Archivo';font-variant-numeric:tabular-nums}
.scorebox:focus{outline:none;border-color:var(--canarinho);box-shadow:0 0 0 3px rgba(255,210,74,.18)}
.scorebox:disabled{opacity:1;background:#FAF8F2;color:var(--chalk)}
.score-x{color:var(--muted-2);font-weight:800;font-size:15px}
.official{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
.official .lab{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.official .res{font-weight:900;font-family:'Archivo';color:var(--celeste);font-size:16px}
.match-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.kick{font-size:11px;color:var(--muted);font-weight:600}
.pts{font-size:11px;font-weight:800;padding:3px 8px;border-radius:99px}
.pts.pos{background:rgba(22,179,106,.15);color:var(--green)}
.pts.zero{background:var(--surface-2);color:var(--muted)}
.pts.pending{background:var(--surface-2);color:var(--muted-2)}
.savep{font-size:11px;color:var(--green);font-weight:700;opacity:0;transition:opacity .3s}
.savep.show{opacity:1}

/* ---------- Ranking ---------- */
.rank-hero{display:flex;gap:8px;overflow-x:auto;padding:2px 0 6px;-webkit-overflow-scrolling:touch}
.rank-hero::-webkit-scrollbar{display:none}
.podium{flex:none;width:108px;background:linear-gradient(180deg,var(--surface),var(--surface-2));
  border:1px solid var(--line);border-radius:var(--r);padding:12px 10px;text-align:center}
.podium.p1{border-color:var(--canarinho)}
.podium .pos{font-family:'Archivo';font-weight:900;font-size:13px;color:var(--muted)}
.podium.p1 .pos{color:var(--canarinho)}
.podium .nick{font-weight:700;font-size:13px;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.podium .tp{font-family:'Archivo';font-weight:900;font-size:22px;margin-top:2px}
.rrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer}
.rrow:last-child{border-bottom:none}
.rrow .rk{font-family:'Archivo';font-weight:900;font-size:15px;width:22px;color:var(--muted);text-align:center}
.rrow.me{box-shadow:inset 3px 0 0 var(--blue)}

/* ---------- Ranking zones ---------- */
.zone-h{display:flex;align-items:center;gap:9px;margin:22px 2px 10px}
.zone-h .zi{font-size:18px}
.zone-h .zt{font-family:'Archivo';font-weight:900;font-size:15px}
.zone-h .zs{margin-left:auto;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.zone-h.know .zt{color:var(--green)}
.zone-h.lay .zt{color:var(--live)}
.zone-h.mid .zt{color:var(--muted)}
.card.know{background:rgba(22,163,74,.09);border-color:rgba(22,163,74,.30)}
.card.lay{background:rgba(229,72,77,.08);border-color:rgba(229,72,77,.30)}
.card.know .rrow,.card.lay .rrow{border-bottom-color:rgba(20,20,20,.07)}
.rrow .info{flex:1;min-width:0}
.rrow .nm{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px}
.rrow .sub{font-size:11px;color:var(--muted);margin-top:2px}
.rrow .tot{font-family:'Archivo';font-weight:900;font-size:20px}
.you-pill{font-size:9px;font-weight:800;background:var(--canarinho);color:#1a1300;padding:2px 6px;border-radius:99px;letter-spacing:.04em}

/* ---------- Buttons / forms ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;
  font-weight:800;font-size:15px;padding:13px 18px;width:100%}
.btn.prim{background:var(--blue);color:#fff}
.btn.prim:active{background:var(--blue-deep)}
.btn.ghost{background:var(--surface-2);color:var(--chalk);border:1px solid var(--line)}
.btn.cel{background:var(--celeste);color:#04263b}
.btn.danger{background:rgba(255,93,93,.14);color:var(--live);border:1px solid rgba(255,93,93,.3)}
.btn.sm{font-size:13px;padding:9px 13px;width:auto}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.input,select.input{width:100%;background:#FAF8F2;border:1px solid var(--line);color:var(--chalk);
  border-radius:11px;padding:12px 13px;font-size:15px;font-weight:600}
.input:focus{outline:none;border-color:var(--celeste);box-shadow:0 0 0 3px rgba(79,176,232,.16)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ---------- Avatar ---------- */
.av{border-radius:99px;overflow:hidden;flex:none;background:var(--surface-2);border:1px solid var(--line)}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(8,12,22,.72);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:24px}
.sheet{background:var(--night);border:1px solid var(--line);border-radius:18px;
  width:100%;max-width:560px;max-height:88vh;overflow:auto;padding:22px 22px}
.sheet h2{margin:2px 0 14px;font-size:20px}
.grab{display:none}

/* ---------- Avatar picker ---------- */
.opts{display:flex;gap:7px;flex-wrap:wrap}
.opt{flex:1;min-width:0;background:#FAF8F2;border:1px solid var(--line);color:var(--chalk);
  border-radius:10px;padding:10px 8px;font-size:13px;font-weight:700;text-align:center}
.opt.on{border-color:var(--canarinho);background:rgba(255,210,74,.1);color:var(--chalk)}
.opt.on.cel{border-color:var(--celeste);background:rgba(79,176,232,.12)}

/* ---------- Auth ---------- */
.auth{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:30px 22px}
.auth .hero{text-align:center;margin-bottom:30px}
.auth .hero .big{font-family:'Archivo';font-weight:900;font-size:46px;line-height:.95}
.auth .hero .sub{color:var(--muted);margin-top:10px;font-size:14px}
.ballmark{font-size:40px;display:block;margin-bottom:6px}

/* ---------- misc ---------- */
.banner{background:rgba(79,176,232,.1);border:1px solid rgba(79,176,232,.3);color:var(--celeste);
  border-radius:12px;padding:11px 13px;font-size:12.5px;font-weight:600;margin:0 0 14px;display:flex;gap:8px;align-items:flex-start}
.note{font-size:12px;color:var(--muted);line-height:1.5}
.divider{height:1px;background:var(--line);margin:14px 0}
.adm-match{padding:11px 12px;border:1px solid var(--line);border-radius:12px;margin-bottom:9px;background:var(--surface)}
.adm-match .h{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:80;background:var(--surface-2);
  border:1px solid var(--line);color:var(--chalk);padding:11px 16px;border-radius:12px;font-weight:700;font-size:13px;
  box-shadow:0 8px 30px rgba(0,0,0,.4)}
.legend{font-size:11px;color:var(--muted);line-height:1.7;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.legend b{color:var(--chalk)}
.tabs-pill{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
.tabs-pill button{flex:1;border:none;background:none;color:var(--muted);font-weight:700;font-size:13px;padding:9px;border-radius:9px}
.tabs-pill button.on{background:var(--surface-2);color:var(--chalk)}

/* ---------- Predictions chrome (estilo referência) ---------- */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:6px 2px 14px;flex-wrap:wrap}
.toolbar .count{font-size:13px;color:var(--muted);font-weight:600}
.viewtoggle{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:3px}
.viewtoggle button{border:none;background:none;color:var(--muted);font-weight:700;font-size:13px;padding:7px 13px;border-radius:7px;display:flex;gap:6px;align-items:center}
.viewtoggle button.on{background:var(--blue-soft);color:var(--blue)}

.legendbar{display:flex;align-items:center;flex-wrap:wrap;gap:6px 14px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 16px;margin-bottom:16px}
.legendbar .ph{font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-right:2px}
.legendbar .it{font-size:13px;color:var(--muted);font-weight:600}
.legendbar .it b{font-family:'Archivo';font-weight:900;font-size:14px;margin-left:2px}
.legendbar .sp{flex:1;min-width:8px}
.legendbar .saved{font-size:12px;font-weight:800;padding:7px 12px;border-radius:9px;background:var(--surface-2);color:var(--muted);display:flex;gap:7px;align-items:center;white-space:nowrap}
.legendbar .saved.ok{background:rgba(22,163,74,.12);color:var(--green)}
.legendbar .saved.pend{background:rgba(217,119,6,.12);color:var(--amber)}

.phasetabs{display:flex;gap:2px;overflow-x:auto;border-bottom:1px solid var(--line);margin-bottom:16px}
.phasetabs::-webkit-scrollbar{display:none}
.phasetab{border:none;background:none;color:var(--muted);font-weight:700;font-size:14px;padding:11px 13px;white-space:nowrap;border-bottom:2px solid transparent;display:flex;gap:7px;align-items:center;cursor:pointer}
.phasetab .badge{font-size:11px;font-weight:800;background:var(--surface-2);color:var(--muted);padding:1px 7px;border-radius:99px}
.phasetab:hover{color:var(--chalk)}
.phasetab.on{color:var(--blue);border-bottom-color:var(--blue)}
.phasetab.on .badge{background:var(--blue-soft);color:var(--blue)}

.grouppills{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.gpill{width:38px;height:38px;border-radius:99px;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-family:'Archivo';font-weight:900;font-size:15px;cursor:pointer}
.gpill:hover{border-color:var(--blue)}
.gpill.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ---------- Match card (referência) ---------- */
.match-meta{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);font-weight:600;margin-bottom:13px;flex-wrap:wrap}
.match-meta .sep{color:var(--muted-2)}
.match-meta .cd{font-weight:800}
.match-meta .cd.live{color:var(--live)} .match-meta .cd.locked{color:var(--muted-2)} .match-meta .cd.open{color:var(--blue)}
.flagimg{width:27px;height:20px;border-radius:3px;box-shadow:0 0 0 1px var(--line);object-fit:cover;display:block;background:var(--surface-2)}
.tcode{font-family:'Archivo';font-weight:900;font-size:16px;letter-spacing:.02em;color:var(--chalk)}
.team .nm{display:none}

/* ---------- Flag dropdown ---------- */
.fsel{position:relative}
.fsel-btn{width:100%;display:flex;align-items:center;gap:9px;background:#FAF8F2;border:1px solid var(--line);
  border-radius:11px;padding:11px 13px;font-size:15px;font-weight:600;color:var(--chalk);cursor:pointer;text-align:left}
.fsel-btn:disabled{opacity:.55;cursor:default}
.fsel-btn .ph{color:var(--muted-2);font-weight:500}
.fsel-btn .caret{margin-left:auto;color:var(--muted);font-size:12px}
.fsel-menu{position:absolute;z-index:25;top:calc(100% + 5px);left:0;right:0;max-height:280px;overflow:auto;
  background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 34px rgba(20,20,20,.14);padding:6px}
.fsel-opt{width:100%;display:flex;align-items:center;gap:10px;background:none;border:none;color:var(--chalk);
  font-size:14px;font-weight:600;padding:9px 10px;border-radius:8px;text-align:left;cursor:pointer}
.fsel-opt:hover{background:var(--surface-2)}
.fsel-opt.on{background:var(--blue-soft);color:var(--blue)}

/* ---------- Login / Google ---------- */
.btn.google{background:#fff;color:#1f2533;border:1px solid var(--line);gap:10px}
.btn.google:hover{background:var(--surface-2)}
.or-div{display:flex;align-items:center;gap:12px;color:var(--muted-2);font-size:12px;font-weight:700;margin:14px 0}
.or-div::before,.or-div::after{content:"";height:1px;background:var(--line);flex:1}
.gicon{width:18px;height:18px;flex:none}
.keeprow{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--muted);font-weight:600;margin:2px 2px 14px;cursor:pointer}
.keeprow input{width:16px;height:16px;accent-color:var(--blue)}

/* ---------- Welcome screen ---------- */
.welcome{display:grid;grid-template-columns:1.1fr .9fr;min-height:100vh}
.welcome-left{position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 36px;background:radial-gradient(120% 120% at 30% 10%, #12a655 0%, #0a6e37 55%, #064d28 100%)}
.welcome-left .wart{width:min(340px,70%);filter:drop-shadow(0 18px 40px rgba(0,0,0,.35));position:relative;z-index:2}
.welcome-left .wtitle{position:relative;z-index:2;text-align:center;color:#fff;font-family:'Archivo';font-weight:900;
  font-size:34px;line-height:1.05;margin-top:26px;text-shadow:0 2px 14px rgba(0,0,0,.25)}
.welcome-left .wtitle .y{color:var(--canarinho)} .welcome-left .wtitle .r{color:#ff6a78}
.welcome-left .wsub{position:relative;z-index:2;color:rgba(255,255,255,.85);font-weight:600;margin-top:10px;font-size:14px}

.confetti{position:absolute;top:0;left:0;bottom:0;width:55%;overflow:hidden;pointer-events:none;z-index:1}
.conf{position:absolute;top:-24px;width:9px;height:14px;border-radius:2px;opacity:0;animation:confFall linear infinite}
@keyframes confFall{
  0%{transform:translateY(-24px) rotate(0deg);opacity:0}
  8%{opacity:1}
  100%{transform:translateY(105vh) rotate(680deg);opacity:.9}
}

/* ---------- Login temático ---------- */
.login{display:grid;grid-template-columns:1.05fr .95fr;min-height:100vh}
.login-hero{position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;
  padding:56px 52px;color:#fff;background:radial-gradient(130% 130% at 18% 8%, #12a655 0%, #0a6e37 52%, #064d28 100%)}

.login-hero .lbrand .d{color:var(--canarinho)} .login-hero .lbrand .r{color:#ff6a78}
.login-hero .ltag{position:relative;z-index:2;margin-top:16px;font-size:16px;font-weight:600;color:rgba(255,255,255,.9);max-width:400px;line-height:1.5}
.login-hero .lfeat{position:relative;z-index:2;margin-top:26px;display:flex;flex-direction:column;gap:12px}
.login-hero .lfeat div{display:flex;gap:11px;align-items:center;font-weight:600;font-size:14.5px;color:rgba(255,255,255,.96)}
.login-art{position:absolute;right:-50px;bottom:-50px;opacity:.92;z-index:1;filter:drop-shadow(0 16px 32px rgba(0,0,0,.3))}
.login-form-wrap{display:flex;align-items:center;justify-content:center;padding:40px 30px;background:var(--surface)}
.login-form{width:100%;max-width:380px}
.login-form .fbrand{font-family:'Archivo';font-weight:900;font-size:28px;margin-bottom:2px}
.login-form .fbrand .d{color:var(--dotblack)} .login-form .fbrand .r{color:var(--redlao)}
.login-form .fsub{color:var(--muted);font-size:14px;margin-bottom:22px;font-weight:600}
@media(max-width:820px){
  .login{grid-template-columns:1fr}
  .login-hero{padding:40px 28px;min-height:auto}
  .login-hero .lbrand{font-size:42px}
  .login-art{width:160px;right:-30px;bottom:-30px}
}

.rules-hero{display:flex;align-items:center;gap:16px;color:#fff;border-radius:16px;padding:20px 22px;margin:6px 0 20px;
  background:radial-gradient(130% 160% at 0% 0%, #12a655 0%, #0a6e37 70%)}
.rules-hero .rt{font-family:'Archivo';font-weight:900;font-size:23px;line-height:1.1}
.rules-hero .rs{color:rgba(255,255,255,.88);font-size:13px;font-weight:600;margin-top:4px}
.rsec-h{font-family:'Archivo';font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:22px 2px 11px;display:flex;align-items:center;gap:8px}
.rules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.rule-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:0 1px 2px rgba(20,20,20,.04)}

.rule-card .big{font-family:'Archivo';font-weight:900;font-size:28px;margin-top:6px;color:var(--blue)}
.rule-card.gold .big{color:var(--canarinho-deep)} .rule-card.zero .big{color:var(--muted-2)}
.rule-card h4{font-family:'Archivo';font-weight:800;margin:2px 0 4px;font-size:15px}
.rule-card p{margin:0;color:var(--muted);font-size:12.5px;line-height:1.5}
.rtable{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;font-size:14px;box-shadow:0 1px 2px rgba(20,20,20,.04)}

.rtable tr:last-child td{border-bottom:none}

.livecard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;

const PHASES = {
  grupos:   { label:"Fase de Grupos",      mult:1,   order:1 },

};
const PHASE_ORDER = Object.keys(PHASES).sort((a,b)=>PHASES[a].order-PHASES[b].order);

const SPECIAL_DEFS = [
  { key:"champion",  label:"Campeão",                 pts:30, ic:"🏆" },
  { key:"runnerUp",  label:"Vice-campeão",            pts:15, ic:"🥈" },
  { key:"topScorer", label:"Artilheiro · Chuteira de Ouro", pts:20, ic:"👟" },

];
const LOCK_MIN = 5;
const LEADER_BONUS = 3;

/* ============================================================
   3. MOTOR DE PONTUAÇÃO  (puro, derivado dos resultados oficiais)
   ============================================================ */
const sgn = n => n>0?1:(n<0?-1:0);

// Pontos de UM jogo. Retorna {pts, exact, winner} ou null se sem palpite/sem resultado.
function scoreMatch(guess, m){
  if(!m || m.resultA==null || m.resultB==null) return null;        // sem resultado oficial
  if(!guess || guess.a==null || guess.b==null) return {pts:0, exact:false, winner:false}; // não palpitou
  const mult = (PHASES[m.phase]||PHASES.grupos).mult;
  const ga=+guess.a, gb=+guess.b, ra=+m.resultA, rb=+m.resultB;
  let base=0, exact=false, winner=false;
  if(ga===ra && gb===rb){ base=10; exact=true; winner=true; }
  else if((ga-gb)===(ra-rb)){ base=6; winner=true; }              // vencedor + saldo
  else if(sgn(ga-gb)===sgn(ra-rb)){ base=4; winner=true; }        // só vencedor/empate
  return { pts: base*mult, exact, winner };
}

// Agrega tudo de um participante.
function scoreParticipant(uid, matches, guessMap, special, official){
  let total=0, exactCount=0, winnerCount=0;
  const perMatch={};
  matches.forEach(m=>{
    const g = guessMap[uid+"_"+m.id];
    const r = scoreMatch(g, m);
    if(r){ total+=r.pts; if(r.exact)exactCount++; if(r.winner)winnerCount++; perMatch[m.id]=r; }
  });
  // especiais
  let championCorrect=false;
  if(official && official.specials){
    SPECIAL_DEFS.forEach(s=>{
      const off=(official.specials[s.key]||"").trim().toLowerCase();
      const my=((special&&special[s.key])||"").trim().toLowerCase();
      if(off && my && off===my){ total+=s.pts; if(s.key==="champion") championCorrect=true; }
    });
  }
  // líderes de grupo
  if(official && official.leaders && special && special.leaders){
    Object.keys(official.leaders).forEach(g=>{
      const off=(official.leaders[g]||"").trim().toLowerCase();
      const my=((special.leaders||{})[g]||"").trim().toLowerCase();
      if(off && my && off===my) total+=LEADER_BONUS;
    });
  }
  return { uid, total, exactCount, winnerCount, championCorrect, perMatch };
}

function buildRanking(participants, matches, guessMap, specialMap, official){
  return participants.map(p=>{
    const s=scoreParticipant(p.uid, matches, guessMap, specialMap[p.uid], official);
    return { ...p, ...s };
  }).sort((a,b)=>
    b.total-a.total ||
    b.exactCount-a.exactCount ||
    b.winnerCount-a.winnerCount ||
    (b.championCorrect?1:0)-(a.championCorrect?1:0) ||
    a.nickname.localeCompare(b.nickname)
  );
}

/* ---------- Rodadas (agrupadas por dia, BRT) ---------- */
const dayKeyOf = (iso)=> new Intl.DateTimeFormat("en-CA",{timeZone:"America/Sao_Paulo",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date(iso));
const dayLabelOf = (key)=>{ const p=key.split("-"); return p[2]+"/"+p[1]; };
function buildRounds(matches){
  const map={};
  matches.forEach(m=>{ const k=dayKeyOf(m.kickoffISO); (map[k]=map[k]||[]).push(m); });
  return Object.keys(map).sort().map(k=>({key:k,label:dayLabelOf(k),matches:map[k]}));
}
const roundDone = (rm)=> rm.length>0 && rm.every(m=> m.resultA!=null && m.resultB!=null);
function roundRanking(rm, people, guessMap){
  return people.map(p=>{
    let total=0,exactCount=0,winnerCount=0;
    rm.forEach(m=>{ const r=scoreMatch(guessMap[p.uid+"_"+m.id], m);
      if(r){ total+=r.pts; if(r.exact)exactCount++; if(r.winner)winnerCount++; } });
    return {...p,total,exactCount,winnerCount};
  }).sort((a,b)=> b.total-a.total || b.exactCount-a.exactCount || b.winnerCount-a.winnerCount || a.nickname.localeCompare(b.nickname));
}
function roundChampion(rm, people, guessMap){
  if(!roundDone(rm)) return null;
  const rk=roundRanking(rm,people,guessMap);
  if(!rk.length || rk[0].total<=0) return null;
  const top=rk[0].total;
  return { champs: rk.filter(p=>p.total===top), pts: top };
}

/* ============================================================
   4. TEMPO / TRAVAMENTO  (tudo em BRT na exibição)
   ============================================================ */
const fmtBRT = (iso)=> new Intl.DateTimeFormat("pt-BR",{
  timeZone:"America/Sao_Paulo", day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit"
}).format(new Date(iso));

function matchStatus(m, now){
  const kick = new Date(m.kickoffISO).getTime();
  const lock = kick - LOCK_MIN*60000;
  const done = m.resultA!=null && m.resultB!=null;
  if(done) return {key:"done", label:"Encerrado"};
  if(now >= kick) return {key:"live", label:"Em andamento"};
  if(now >= lock) return {key:"locked", label:"Palpites fechados"};
  const mins = Math.round((lock-now)/60000);
  if(mins <= 90) return {key:"soon", label:"Fecha em "+(mins<1?"<1":mins)+" min"};
  return {key:"open", label:"Palpites abertos"};
}
const isLocked = (m, now)=> now >= (new Date(m.kickoffISO).getTime() - LOCK_MIN*60000) || (m.resultA!=null);
const isStarted = (m, now)=> now >= new Date(m.kickoffISO).getTime() || (m.resultA!=null);
const specialsLockMs = ()=> new Date(OPENING_KICKOFF).getTime() - LOCK_MIN*60000;

const DEMO = String(firebaseConfig.apiKey).includes("COLE_AQUI");

function makeFirebaseStore(){
  firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth(), db=firebase.firestore();
  const sub=(coll,cb)=> db.collection(coll).onSnapshot(s=> cb(s.docs.map(d=>({id:d.id,...d.data()}))));
  return {
    demo:false,
    onAuth:(cb)=> auth.onAuthStateChanged(cb),
    setKeepLogged:(keep)=> auth.setPersistence(keep
      ? firebase.auth.Auth.Persistence.LOCAL
      : firebase.auth.Auth.Persistence.SESSION),
    signUp:(e,p)=> auth.createUserWithEmailAndPassword(e,p),
    signIn:(e,p)=> auth.signInWithEmailAndPassword(e,p),
    signOut:()=> auth.signOut(),
    subParticipants:(cb)=> sub("participants",cb),
    subMatches:(cb)=> sub("matches",cb),
    subGuesses:(cb)=> sub("guesses",cb),
    subSpecials:(cb)=> sub("specials",cb),
    subOfficial:(cb)=> db.collection("meta").doc("official").onSnapshot(d=> cb(d.exists?d.data():{})),
    saveProfile:(uid,d)=> db.collection("participants").doc(uid).set(d,{merge:true}),
    saveGuess:(uid,mId,g)=> db.collection("guesses").doc(uid+"_"+mId).set({uid,matchId:mId,...g},{merge:true}),
    saveSpecials:(uid,d)=> db.collection("specials").doc(uid).set(d,{merge:true}),
    saveMatch:(m)=>{ const ref=m.id?db.collection("matches").doc(m.id):db.collection("matches").doc();
      const {id,...rest}=m; return ref.set(rest,{merge:true}); },
    deleteMatch:(id)=> db.collection("matches").doc(id).delete(),
    saveOfficial:(d)=> db.collection("meta").doc("official").set(d,{merge:true}),
  };
}

function countdownLabel(m, now){
  const kick=new Date(m.kickoffISO).getTime();
  if(m.resultA!=null) return null;
  if(now>=kick) return {t:"Ao vivo", c:"live"};
  if(now>=kick-LOCK_MIN*60000) return {t:"Fechado", c:"locked"};
  const ms=kick-now, d=Math.floor(ms/86400000), h=Math.floor((ms%86400000)/3600000), mm=Math.floor((ms%3600000)/60000);
  return {t: d>0 ? d+"d "+h+"h" : (h>0 ? h+"h "+mm+"min" : mm+"min"), c:"open"};
}

/* ---------- HOME ---------- */
function PodiumCard({p, rank, total, medal, lant}){
  return (
    <div className={"podium"+(rank===1?" p1":"")+(lant?" lant":"")}>
      <div className="pos">{medal} {rank}º</div>
      <div style={{display:"flex",justifyContent:"center",margin:"8px 0 2px"}}><Avatar avatar={p.avatar} size={40}/></div>
      <div className="nick">{p.nickname}</div>
      <div className="tp num">{p.total}</div>
    </div>
  );
}

function LiveGuessCard({m, people, guessMap}){
  const ta=teamInfo(m.teamA), tb=teamInfo(m.teamB);
  const list=[...people]
    .map(p=>({nick:p.nickname, g:guessMap[p.uid+"_"+m.id]}))
    .sort((a,b)=> a.nick.localeCompare(b.nick,"pt"));
  const gs=list.map(x=>x.g).filter(Boolean);
  const n=gs.length;
  let aWin=0,draw=0,bWin=0,sumA=0,sumB=0; const sc={};
  gs.forEach(g=>{ const a=+g.a,b=+g.b; sumA+=a; sumB+=b;
    if(a>b)aWin++; else if(a<b)bWin++; else draw++;
    const k=a+"-"+b; sc[k]=(sc[k]||0)+1; });
  const pct=(x)=> n?Math.round(x/n*100):0;
  const aP=pct(aWin), dP=pct(draw), bP=n?Math.max(0,100-aP-dP):0;
  const topScores=Object.entries(sc).sort((x,y)=>y[1]-x[1]).slice(0,3);
  let winLab="", winPc=0, winFlag=null;
  if(n){
    if(aWin>=draw && aWin>=bWin){ winLab=ta.c; winPc=aP; winFlag=m.teamA; }
    else if(bWin>=aWin && bWin>=draw){ winLab=tb.c; winPc=bP; winFlag=m.teamB; }
    else { winLab="Empate"; winPc=dP; }
  }
  return (
    <div className="livecard on">
      <div className="lc-head">
        <span className="lc-title">{ta.c} × {tb.c}</span>
        <span className="status live"><span className="d"></span>Em andamento</span>
      </div>

      {n>0 &&
        <div className="cons">
          <div className="cons-lab">Favorito do bolão · {n} palpite{n>1?"s":""}</div>
          <div className="cons-winner">
            <span className="w">{winFlag && <Flag name={winFlag}/>} {winLab}</span>
            <span className="pc">{winPc}%</span>
          </div>
          <div className="probbar">
            <div className="seg a" style={{width:aP+"%"}}/>
            <div className="seg d" style={{width:dP+"%"}}/>
            <div className="seg b" style={{width:bP+"%"}}/>
          </div>
          <div className="prob-ends">
            <span>{ta.c} {aP}%</span><span>Empate {dP}%</span><span>{tb.c} {bP}%</span>
          </div>
          <div className="xg">Placar médio cravado:
            <span className="v"><span className="va">{(sumA/n).toFixed(1)}</span> <span className="dash">–</span> <span className="vb">{(sumB/n).toFixed(1)}</span></span>
          </div>
          {topScores.length>0 &&
            <div className="scores">
              {topScores.map(([k,c])=>(
                <div className="scl" key={k}>
                  <span className="sc">{k.replace("-"," - ")}</span>
                  <span className="track"><span className="fill" style={{width:Math.round(c/n*100)+"%"}}/></span>
                  <span className="pct">{Math.round(c/n*100)}%</span>
                </div>
              ))}
            </div>}
        </div>}

      <div className="lc-rows">
        {list.map((x,i)=>(
          <div className="lc-row" key={i}>
            <span className="nk">{x.nick}</span>
            <span className={"pl"+(x.g?"":" none")}>{x.g ? x.g.a+" - "+x.g.b : "—"}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Home({matches, now, ranking, me, guessMap, onSave, savedId}){
  const sorted=[...matches].sort((x,y)=> new Date(x.kickoffISO)-new Date(y.kickoffISO));
  const live=sorted.filter(m=> isStarted(m,now) && m.resultA==null);
  const next=sorted.filter(m=> !isStarted(m,now)).slice(0,9);
  const top3=ranking.slice(0,3);
  const topIds=new Set(top3.map(p=>p.uid));
  const leigos = ranking.length>3 ? ranking.filter(p=>!topIds.has(p.uid)).slice(-3) : [];
  const medals=["🥇","🥈","🥉"];
  const rounds=buildRounds(matches);
  const doneR=rounds.filter(r=>roundDone(r.matches));
  const lastDone=doneR[doneR.length-1];
  const rc=lastDone?roundChampion(lastDone.matches,ranking,guessMap):null;
  return (
    <div className="wrap">
      {rc &&
        <div className="round-champ">
          <span className="ic">🏅</span>
          <div>
            <div className="t">Campeão da rodada · {lastDone.label}</div>
            <div className="s">{rc.champs.map(c=>c.nickname).join(", ")} · +{rc.pts} pts naquele dia</div>
          </div>
        </div>}
      {top3.length>0 &&
        <div className="hero-zones">
          <div>
            <div className="zone-h know"><span className="zi">🧠</span><span className="zt">Os Grandes Conhecedores</span><span className="zs">{ranking.length}/{MAX_PLAYERS}</span></div>
            <div className="rank-hero">
              {top3.map((p,i)=><PodiumCard key={p.uid} p={p} rank={i+1} medal={medals[i]}/>)}
            </div>
          </div>
          {leigos.length>0 &&
            <div>
              <div className="zone-h lay"><span className="zi">🙈</span><span className="zt">Os Grandes Leigos</span></div>
              <div className="rank-hero">
                {leigos.map((p)=>{ const rank=ranking.indexOf(p)+1;
                  return <PodiumCard key={p.uid} p={p} rank={rank} medal={"🔻"} lant={rank===ranking.length}/>;})}
              </div>
            </div>}
        </div>}

      <div className="sect-h"><h2>Jogos em andamento</h2></div>
      {live.length
        ? <div className="matchgrid">
            {live.map(m=><LiveGuessCard key={m.id} m={m} people={ranking} guessMap={guessMap}/>)}
          </div>
        : <div className="empty">Nenhum jogo rolando neste momento. Os palpites de cada um aparecem aqui assim que a bola rolar.</div>}

      <div className="sect-h"><h2>Próximos jogos</h2></div>
      {next.length
        ? <div className="matchgrid">
            {next.map(m=>(
              <MatchCard key={m.id} m={m} now={now} guess={guessMap[me+"_"+m.id]}
                editable={!isLocked(m,now)} onSave={onSave} showSaved={savedId===m.id}/>))}
          </div>
        : <div className="empty">A tabela ainda não foi cadastrada pelo curador.</div>}
    </div>
  );
}

const PHASE_SHORT = {grupos:"Grupos", r32:"Round of 32", oitavas:"Oitavas", quartas:"Quartas", semis:"Semis", terceiro:"3º lugar", final:"Final"};

function MyPage({matches, now, me, guessMap, specialMap, official, onSave, onSaveSpecial, savedId}){
  const [tab,setTab]=useState("jogos");
  const [phase,setPhase]=useState("grupos");
  const [group,setGroup]=useState("A");
  const [view,setView]=useState("grupos"); // grupos | agenda
  const myScore=scoreParticipant(me, matches, guessMap, specialMap[me], official);
  const mySpecial=specialMap[me]||{};
  const sLocked = now >= specialsLockMs();
  const groups=[...new Set(matches.filter(m=>m.phase==="grupos"&&m.group).map(m=>m.group))].sort();
  const closed=[...matches].filter(m=> isLocked(m,now)).sort((x,y)=> new Date(x.kickoffISO)-new Date(y.kickoffISO));

  const phaseCount=(k)=> matches.filter(m=>m.phase===k).length;
  const phaseMatches=[...matches].filter(m=>m.phase===phase).sort((x,y)=> new Date(x.kickoffISO)-new Date(y.kickoffISO));
  const grouped = phase==="grupos" && view==="grupos";
  const visible = grouped ? phaseMatches.filter(m=>m.group===group) : phaseMatches;

  const ph=PHASES[phase]||PHASES.grupos;
  const editableVisible=visible.filter(m=>!isLocked(m,now));
  const pend=editableVisible.filter(m=>!guessMap[me+"_"+m.id]).length;

  const opMs=new Date(OPENING_KICKOFF).getTime();
  const kickTxt = now<opMs ? (Math.max(1,Math.ceil((opMs-now)/86400000))+" dias para a abertura") : "Copa em andamento";

  return (
    <div className="wrap">
      <div className="card narrow" style={{padding:"14px 18px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div className="note">Seu total</div><div className="num" style={{fontSize:32,fontWeight:900}}>{myScore.total} pts</div></div>
        <div style={{textAlign:"right"}} className="note">Cravadas: <b style={{color:"var(--chalk)"}}>{myScore.exactCount}</b><br/>Acertos: <b style={{color:"var(--chalk)"}}>{myScore.winnerCount}</b></div>
      </div>

      <div className="tabs-pill narrow">
        <button className={tab==="jogos"?"on":""} onClick={()=>setTab("jogos")}>Jogos</button>
        <button className={tab==="especiais"?"on":""} onClick={()=>setTab("especiais")}>Especiais</button>
        <button className={tab==="historico"?"on":""} onClick={()=>setTab("historico")}>Histórico</button>
      </div>

      {tab==="jogos" && <>
        <div className="toolbar">
          <span className="count">{matches.length} jogos · {kickTxt}</span>
          {phase==="grupos" &&
            <div className="viewtoggle">
              <button className={view==="grupos"?"on":""} onClick={()=>setView("grupos")}>▦ Grupos</button>
              <button className={view==="agenda"?"on":""} onClick={()=>setView("agenda")}>🗓 Agenda</button>
            </div>}
        </div>

        <div className="phasetabs">
          {PHASE_ORDER.map(k=>(
            <button key={k} className={"phasetab"+(phase===k?" on":"")} onClick={()=>setPhase(k)}>
              {PHASE_SHORT[k]} <span className="badge">{phaseCount(k)}</span>
            </button>
          ))}
        </div>

        {grouped && groups.length>0 &&
          <div className="grouppills">
            {groups.map(g=>(
              <button key={g} className={"gpill"+(group===g?" on":"")} onClick={()=>setGroup(g)}>{g}</button>
            ))}
          </div>}

        {visible.length>0 &&
          <div className="legendbar">
            <span className="ph">{ph.label}{grouped?" · Grupo "+group:""}</span>
            <span className="it">Placar exato:<b style={{color:"var(--green)"}}>{10*ph.mult}</b></span>
            <span className="it">Vencedor + saldo:<b style={{color:"var(--amber)"}}>{6*ph.mult}</b></span>
            <span className="it">Resultado certo:<b style={{color:"var(--blue)"}}>{4*ph.mult}</b></span>
            <span className="it">Errou:<b style={{color:"var(--muted-2)"}}>0</b></span>
            <span className="sp"></span>
            {editableVisible.length>0 &&
              <span className={"saved "+(pend===0?"ok":"pend")}>{pend===0?"✓ Tudo salvo":"● "+pend+" pendente"+(pend>1?"s":"")}</span>}
          </div>}

        {visible.length
          ? <div className="matchgrid">
              {visible.map(m=>(
                <MatchCard key={m.id} m={m} now={now} guess={guessMap[me+"_"+m.id]}
                  editable={!isLocked(m,now)} onSave={onSave} showSaved={savedId===m.id}/>))}
            </div>
          : <div className="empty">Os jogos desta fase ainda não foram cadastrados pelo curador.</div>}

      {tab==="especiais" && <div className="narrow"><Specials

      {tab==="historico" && <>
        <div className="sect-h"><h2>Histórico</h2></div>
        {closed.length
          ? <div className="matchgrid">
              {closed.map(m=>{
                const r=myScore.perMatch[m.id];
                return <MatchCard key={m.id} m={m} now={now} guess={guessMap[me+"_"+m.id]} editable={false}
                  ptResult={r===undefined?null:r}/>;
              })}
            </div>
          : <div className="empty">Seus palpites travados aparecerão aqui.</div>}
      </>}
    </div>
  );
}

function Specials({defs, groups, matches, value, locked, official, onSave}){
  const [v,setV]=useState(value);
  useEffect(()=>setV(value),[JSON.stringify(value)]);
  const set=(k,val)=>{ const nv={...v,[k]:val}; setV(nv); onSave(nv); };
  const setLeader=(g,val)=>{ const nv={...v,leaders:{...(v.leaders||{}),[g]:val}}; setV(nv); onSave(nv); };
  const off=official&&official.specials||{};
  const COUNTRY = {champion:true, runnerUp:true};
  const teamsOf=(g)=> [...new Set(matches.filter(m=>m.group===g).flatMap(m=>[m.teamA,m.teamB]))].sort((a,b)=>a.localeCompare(b,"pt"));
  return (
    <>
      <div className="banner">⏱️ Os especiais travam 5 min antes da abertura ({fmtBRT(OPENING_KICKOFF)} BRT) e são apurados no fim do torneio.</div>
      <div className="sect-h"><h2>Palpites especiais</h2></div>
      {defs.map(s=>(
        <div className="field" key={s.key}>
          <label>{s.ic} {s.label} · {s.pts} pts</label>
          {COUNTRY[s.key]
            ? <FlagSelect value={v[s.key]||""} options={ALL_TEAMS} disabled={locked}
                placeholder={locked?"travado":"Escolha a seleção"} onChange={val=>set(s.key,val)}/>
            : <input className="input" disabled={locked} value={v[s.key]||""}
                onChange={e=>set(s.key,e.target.value)} placeholder={locked?"travado":"sua aposta..."}/>}
          {off[s.key] && <div className="note" style={{marginTop:4}}>Oficial: <b style={{color:"var(--celeste)"}}>{off[s.key]}</b></div>}
        </div>
      ))}
      {groups.length>0 && <>
        <div className="sect-h"><h2>Líderes de grupo · +3 cada</h2></div>
        <div className="note" style={{marginBottom:10}}>Aposte quem termina em 1º em cada grupo. Apurado no fim da fase de grupos.</div>
        {groups.map(g=>(
          <div className="field" key={g}>
            <label>Líder do Grupo {g}</label>
            <FlagSelect value={(v.leaders||{})[g]||""} options={teamsOf(g)} disabled={locked}
              placeholder={locked?"travado":"Escolha a seleção do grupo"} onChange={val=>setLeader(g,val)}/>
          </div>
        ))}
      </>}
    </>
  );
}

function Ranking({ranking, me, matches, now, guessMap, specialMap, official}){
  const [sel,setSel]=useState(null);
  const Row = (p,i)=>(
    <div key={p.uid} className={"rrow"+(p.uid===me?" me":"")} onClick={()=>setSel(p)}>
      <span className="rk">{i+1}</span>
      <Avatar avatar={p.avatar} size={40}/>
      <div className="info">
        <div className="nm">{p.nickname} {p.uid===me && <span className="you-pill">VOCÊ</span>}</div>
        <div className="sub">{p.exactCount} cravadas · {p.winnerCount} acertos</div>
      </div>
      <span className="tot num">{p.total}</span>
    </div>
  );
  const know=ranking.slice(0,4);
  const knowIds=new Set(know.map(p=>p.uid));
  const rest=ranking.filter(p=>!knowIds.has(p.uid));
  const lay=rest.slice(-4);
  const layIds=new Set(lay.map(p=>p.uid));
  const middle=rest.filter(p=>!layIds.has(p.uid));

  return (
    <div className="wrap narrow">
      <div className="zone-h know"><span className="zi">🧠</span><span className="zt">Zona dos Conhecedores</span><span className="zs">Top 4</span></div>
      <div className="card know">
        {know.length ? know.map(p=>Row(p,ranking.indexOf(p))) : <div className="rrow"><span className="sub">Ainda sem participantes.</span></div>}
      </div>

      {middle.length>0 && <>
        <div className="zone-h mid"><span className="zi">⚽</span><span className="zt">Meio de tabela</span></div>
        <div className="card">
          {middle.map(p=>Row(p,ranking.indexOf(p)))}
        </div>
      </>}

      {lay.length>0 && <>
        <div className="zone-h lay"><span className="zi">🙈</span><span className="zt">Zona dos Leigos</span><span className="zs">Últimos 4</span></div>
        <div className="card lay">
          {lay.map(p=>Row(p,ranking.indexOf(p)))}
        </div>
      </>}

      <div className="legend" style={{marginTop:14}}>
        <b>Desempate:</b> 1) mais placares exatos · 2) mais acertos de vencedor · 3) acerto do campeão.
      </div>
      {sel && <CompetitorSheet p={sel} me={me} matches={matches} now={now}
        guessMap={guessMap} specialMap={specialMap} official={official} onClose={()=>setSel(null)}/>}
    </div>
  );
}

function CompetitorSheet({p, me, matches, now, guessMap, specialMap, official, onClose}){
  const isMe = p.uid===me;
  // só jogos já iniciados/encerrados ficam visíveis para os demais
  const visible=[...matches]
    .filter(m=> isMe || isStarted(m,now))
    .sort((x,y)=> new Date(y.kickoffISO)-new Date(x.kickoffISO));
  const sc=scoreParticipant(p.uid, matches, guessMap, specialMap[p.uid], official);
  const sp=specialMap[p.uid]||{};
  const sLocked = now>=specialsLockMs();
  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="grab"></div>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
          <Avatar avatar={p.avatar} size={52}/>
          <div><h2 style={{margin:0}}>{p.nickname}</h2>
            <div className="note">{sc.total} pts · {sc.exactCount} cravadas · {sc.winnerCount} acertos</div></div>
        </div>
        <div className="sect-h"><h2>Palpites {isMe?"":"(jogos já iniciados)"}</h2></div>
        {visible.length? visible.map(m=>{
          const g=guessMap[p.uid+"_"+m.id];
          const r=sc.perMatch[m.id];
          return (
            <div className="adm-match" key={m.id}>
              <div className="h">
                <span className="note">{(PHASES[m.phase]||PHASES.grupos).label}{m.group?" · G"+m.group:""}</span>
                {r?<span className={"pts "+(r.pts>0?"pos":"zero")}>{r.pts>0?"+"+r.pts:"0"} pts</span>
                  :<span className="pts pending">—</span>}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
                  <Flag name={m.teamA}/> {teamInfo(m.teamA).c} <span className="score-x">×</span> {teamInfo(m.teamB).c} <Flag name={m.teamB}/>
                </span>
                <span className="num" style={{fontWeight:900,fontSize:17}}>
                  {g?(g.a+" × "+g.b):"—"}
                  {m.resultA!=null && <span className="note" style={{marginLeft:8}}>(of. {m.resultA}×{m.resultB})</span>}
                </span>
              </div>
            </div>
          );
        }) : <div className="empty">Sem jogos visíveis ainda.</div>}

        {(sLocked || isMe) && <>
          <div className="sect-h"><h2>Especiais</h2></div>
          {SPECIAL_DEFS.map(s=>(
            <div key={s.key} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid var(--line)"}}>
              <span className="note">{s.ic} {s.label}</span>
              <span style={{fontWeight:700}}>{sp[s.key]||"—"}</span>
            </div>
          ))}
        </>}
        <button className="btn ghost" style={{marginTop:16}} onClick={onClose}>Fechar</button>
      </div>
    </div>
  );
}

function AdminMatches({matches, onImport, onSaveMatch, onDeleteMatch, onSaveResult}){
  const blank={phase:"grupos",group:"",teamA:"",teamB:"",kickoffLocal:""};
  const [f,setF]=useState(blank);
  const sorted=[...matches].sort((x,y)=> new Date(x.kickoffISO)-new Date(y.kickoffISO));
  const hasMatches=matches.length>0;
  const add=()=>{
    if(!f.teamA||!f.teamB||!f.kickoffLocal){return;}
    onSaveMatch({phase:f.phase,group:f.group,teamA:f.teamA,teamB:f.teamB,
      kickoffISO:localToISO(f.kickoffLocal), resultA:null, resultB:null});
    setF(blank);
  };
  return (
    <>
      {!hasMatches &&
        <div className="card" style={{padding:16,marginBottom:16}}>
          <div style={{fontWeight:800,fontSize:16,marginBottom:4}}>Tabela oficial da fase de grupos</div>
          <div className="note" style={{marginBottom:12}}>Importe de uma vez os 72 jogos já divulgados (datas e horários em BRT, por grupo). Você ainda pode editar ou excluir qualquer jogo depois.</div>
          <button className="btn prim" onClick={()=>{ if(confirm("Importar os 72 jogos oficiais da fase de grupos?")) onImport(); }}>Importar tabela oficial (72 jogos)</button>
        </div>}

// datetime-local (sem fuso) -> ISO com offset BRT (-03:00)
function localToISO(local){ return local ? local+":00-03:00" : ""; }
function isoToLocal(iso){

function Confetti({n=34}){
  const colors=["#FFD400","#FFE45C","#0E8C46","#16B36A","#FFC72C","#0a6e37"];
  const pieces=useMemo(()=> Array.from({length:n},(_,i)=>({
    left: Math.random()*52,
    delay: -Math.random()*6,
    dur: 3.4+Math.random()*3.2,
    bg: colors[i%colors.length],
    w: 7+Math.random()*6,
    h: 10+Math.random()*8,
    round: Math.random()>.6,
  })),[n]);
  return (
    <div className="confetti">
      {pieces.map((p,i)=>(
        <span key={i} className="conf" style={{
          left:p.left+"%", background:p.bg, width:p.w, height:p.h,
          borderRadius:p.round?"50%":"2px",
          animationDuration:p.dur+"s", animationDelay:p.delay+"s",
        }}/>
      ))}
    </div>
  );
}

function BallArt({size=130}){
  const C=50, R=44;
  const penta=(cx,cy,r,rot)=> Array.from({length:5},(_,i)=>{
    const a=(rot + i*72)*Math.PI/180; return (cx+r*Math.cos(a)).toFixed(1)+","+(cy+r*Math.sin(a)).toFixed(1);
  }).join(" ");
  const dirs=[-90,-18,54,126,198];
  return (
    <svg viewBox="0 0 100 100" width={size} height={size} xmlns="http://www.w3.org/2000/svg">
      <circle cx={C} cy={C} r={R} fill="#fff" stroke="#0b3a22" strokeWidth="2.5"/>
      <g stroke="#15241b" strokeWidth="2.4">
        {dirs.map((d,i)=>{const a=d*Math.PI/180;
          return <line key={i} x1={(C+14*Math.cos(a)).toFixed(1)} y1={(C+14*Math.sin(a)).toFixed(1)}
            x2={(C+34*Math.cos(a)).toFixed(1)} y2={(C+34*Math.sin(a)).toFixed(1)}/>;})}
      </g>
      <polygon points={penta(C,C,15,-90)} fill="#15241b"/>
      {dirs.map((d,i)=>{const a=d*Math.PI/180; const x=C+38*Math.cos(a), y=C+38*Math.sin(a);
        return <polygon key={i} points={penta(x,y,7,d+90)} fill="#15241b"/>;})}
    </svg>
  );
}

function SpecialsBoard({participants, specialMap, matches, now, me}){
  const firstKick = matches.length ? Math.min(...matches.map(m=>new Date(m.kickoffISO).getTime())) : Infinity;
  const revealed = now >= firstKick;
  const groups=[...new Set(matches.filter(m=>m.phase==="grupos"&&m.group).map(m=>m.group))].sort();
  const cols=[...participants].sort((a,b)=> a.nickname.localeCompare(b.nickname,"pt"));
  const rows=[
    ...SPECIAL_DEFS.map(s=>({key:s.key, label:s.label.split(" · ")[0], ic:s.ic, country:(s.key==="champion"||s.key==="runnerUp")})),
    ...groups.map(g=>({key:"L"+g, leader:g, label:"Líder "+g, ic:"🥇", country:true})),
  ];
  const cellVal=(p,row)=>{ const sp=specialMap[p.uid]||{};
    return row.leader ? ((sp.leaders||{})[row.leader]||"") : (sp[row.key]||""); };

  if(!revealed){
    return (
      <div className="wrap narrow">
        <div className="rules-hero"><BallArt size={60}/>
          <div><div className="rt">Especiais de todos</div>
            <div className="rs">Revelados quando a bola rolar no primeiro jogo.</div></div></div>
        <div className="empty">🔒 Os palpites especiais de todo mundo ficam visíveis a partir do <b>início do primeiro jogo</b>
          {firstKick<Infinity ? " ("+fmtBRT(new Date(firstKick).toISOString())+" BRT)" : ""}.
          <br/>Até lá, cada um enxerga apenas os seus, na aba Palpites.</div>
      </div>
    );
  }
  return (
    <div className="wrap">
      <div className="sect-h"><h2>Palpites especiais de todos</h2><span className="note">{cols.length} participantes</span></div>
      <div className="sboard-wrap">
        <table className="sboard">
          <thead>
            <tr>
              <th className="corner">Palpite</th>
              {cols.map(p=><th key={p.uid} className={p.uid===me?"you":""}>{p.nickname}</th>)}
            </tr>
          </thead>
          <tbody>
            {rows.map(row=>(
              <tr key={row.key}>
                <td className="rowh">{row.ic} {row.label}</td>
                {cols.map(p=>{ const v=cellVal(p,row);
                  return (
                    <td key={p.uid} className={"val"+(v?"":" empty")+(p.uid===me?" you-col":"")}>
                      {v ? (row.country ? <span className="cellflag"><Flag name={v}/> {v}</span> : v) : "—"}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="legend" style={{marginTop:12}}>
        Mostra o que cada um cravou. Os pontos dos especiais entram no ranking quando o curador lançar os resultados oficiais.
      </div>
    </div>
  );
}

/* ---------- AUTH (modo real) ---------- */
function Auth(){
  const seen = (()=>{ try{ return !!localStorage.getItem("broslao_acct"); }catch(e){ return false; } })();
  const [mode,setMode]=useState(seen ? "in" : "up");   // máquina nova → criar conta
  const [email,setEmail]=useState(""); const [pass,setPass]=useState(""); const [err,setErr]=useState("");
  const [keep,setKeep]=useState(true); const [busy,setBusy]=useState(false);
  const remember=()=>{ try{ localStorage.setItem("broslao_acct","1"); }catch(e){} };
  const signup = mode==="up";
  const go=async()=>{
    const mail=email.trim();
    if(!mail || !pass){ setErr("Preencha e-mail e senha."); return; }
    if(signup && pass.length<6){ setErr("A senha precisa ter ao menos 6 caracteres."); return; }
    setErr(""); setBusy(true);
    try{ await store.setKeepLogged(keep); }catch(e){ /* persistência é opcional, não bloqueia */ }
    try{
      signup ? await store.signUp(mail,pass) : await store.signIn(mail,pass);
      remember();
    }catch(e){ setErr(traduzErro(e.code||e.message)); }
    setBusy(false);
  };
  return (
    <div className="login">
      <div className="login-hero">
        <Confetti n={26}/>
        <div className="lbrand">BROS<span className="d">.</span><span className="r">lão</span></div>
        <div className="ltag">O bolão da Copa do Mundo 2026 entre amigos. Crave os placares, dispute os especiais e suba no ranking.</div>
        <div className="lfeat">
          <div>🏆 104 jogos — da fase de grupos à final</div>
          <div>🥇 Campeão, artilheiro e líderes de grupo</div>
          <div>📊 Ranking ao vivo: Conhecedores x Leigos</div>
        </div>
        <div className="login-art"><BallArt size={300}/></div>
      </div>
      <div className="login-form-wrap">
        <div className="login-form">
          <div className="fbrand">BROS<span className="d">.</span><span className="r">lão</span></div>
          <div className="fsub">{signup ? "Primeiro acesso · crie sua conta" : "Bem-vindo de volta · entre na sua conta"}</div>
          <div className="field"><label>E-mail</label>
            <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)}
              placeholder="voce@email.com"/></div>
          <div className="field"><label>{signup?"Crie uma senha":"Senha"}</label>
            <input className="input" type="password" value={pass} onChange={e=>setPass(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") go(); }}
              placeholder={signup?"mínimo 6 caracteres":"••••••"}/></div>
          <label className="keeprow"><input type="checkbox" checked={keep} onChange={e=>setKeep(e.target.checked)}/> Manter conectado neste aparelho</label>
          {err && <div className="banner" style={{background:"rgba(229,72,77,.1)",borderColor:"rgba(229,72,77,.3)",color:"var(--live)"}}>{err}</div>}
          <button className="btn prim" onClick={go} disabled={busy} style={{marginTop:4,opacity:busy?.6:1}}>
            {busy ? "Aguarde…" : (signup?"Criar conta e entrar":"Entrar")}</button>
          <button className="btn ghost" style={{marginTop:10}} onClick={()=>{ setErr(""); setMode(signup?"in":"up"); }}>
            {signup?"Já tenho conta · Entrar":"Primeiro acesso? Criar conta"}</button>
        </div>
      </div>
    </div>
  );
}
function traduzErro(c){
  c = String(c||"");
  if(/email-already/.test(c))return "Esse e-mail já tem conta. Use 'Já tenho conta · Entrar'.";
  if(/weak-password/.test(c))return "Senha muito curta (mín. 6 caracteres).";
  if(/invalid-credential|wrong-password|user-not-found/.test(c))return "E-mail ou senha incorretos.";
  if(/invalid-email/.test(c))return "E-mail inválido.";
  if(/operation-not-allowed|configuration-not-found/.test(c))return "Login por e-mail/senha não está ativado no Firebase. Ative em Authentication → Sign-in method → Email/Password.";
  if(/network-request-failed/.test(c))return "Falha de conexão. Verifique a internet e tente de novo.";
  if(/too-many-requests/.test(c))return "Muitas tentativas. Aguarde um momento e tente de novo.";
  return "Não foi possível entrar. Tente de novo. (" + c.replace("auth/","") + ")";
}

/* ============================================================
   8. APP
   ============================================================ */
function App(){
  const [user,setUser]=useState(undefined);     // undefined=carregando, null=deslogado
  const [profile,setProfile]=useState(undefined);
  const [participants,setParticipants]=useState([]);
  const [pLoaded,setPLoaded]=useState(false);   // participantes já carregados do banco?
  const [matches,setMatches]=useState(()=>mergeMatches([]));   // já começa com os 72 jogos-base
  const [guesses,setGuesses]=useState([]);
  const [specials,setSpecials]=useState([]);
  const [official,setOfficial]=useState({});
  const [tab,setTab]=useState("home");
  const [now,setNow]=useState(Date.now());
  const [savedId,setSavedId]=useState(null);
  const [toast,setToast]=useState("");

  useEffect(()=> store.onAuth(u=> setUser(u||null)),[]);
  useEffect(()=>{ const t=setInterval(()=>setNow(Date.now()),20000); return ()=>clearInterval(t); },[]);
  useEffect(()=>{
    const subs=[store.subParticipants(d=>{ setParticipants(d.map(p=>({uid:p.id||p.uid,...p}))); setPLoaded(true); }),
      store.subMatches(d=>setMatches(mergeMatches(d))), store.subGuesses(setGuesses),
      store.subSpecials(setSpecials), store.subOfficial(setOfficial)];
    const safety=setTimeout(()=>setPLoaded(true),5000); // não trava se o banco demorar
    return ()=>{ subs.forEach(u=>u&&u()); clearTimeout(safety); };
  },[]);

  // perfil do usuário atual (só decide depois que os participantes carregarem)
  useEffect(()=>{
    if(!user){ setProfile(undefined); return; }
    if(!pLoaded){ setProfile(undefined); return; }   // ainda carregando → não mostra cadastro à toa
    const p=participants.find(x=>x.uid===user.uid);
    setProfile(p||null);
  },[user,participants,pLoaded]);

  const guessMap=useMemo(()=>{const m={};guesses.forEach(g=>m[(g.uid)+"_"+(g.matchId)]=g);return m;},[guesses]);
  const specialMap=useMemo(()=>{const m={};specials.forEach(s=>m[s.uid||s.id]=s);return m;},[specials]);
  const ranking=useMemo(()=>buildRanking(participants,matches,guessMap,specialMap,official),
    [participants,matches,guessMap,specialMap,official]);
  const isAdmin = store.demo || (user && ADMIN_EMAILS.map(e=>e.toLowerCase()).includes((user.email||"").toLowerCase()));
  const me = user?.uid;

  const flash=(id)=>{ setSavedId(id); setTimeout(()=>setSavedId(s=>s===id?null:s),1600); };
  const popToast=(t)=>{ setToast(t); setTimeout(()=>setToast(""),2200); };

  const onSaveGuess=async(mId,g)=>{
    try{ await store.saveGuess(me,mId,g); flash(mId); }
    catch(e){ popToast("⚠️ Não consegui salvar o palpite. Verifique a conexão."); }
  };
  const onSaveSpecial=async(d)=>{
    try{ await store.saveSpecials(me,d); }
    catch(e){ popToast("⚠️ Não consegui salvar. Tente de novo."); }
  };
  const onSaveMatch=(m)=>{ store.saveMatch(m); popToast("Jogo salvo"); };
  const onDeleteMatch=(id)=>{ store.deleteMatch(id); popToast("Jogo excluído"); };
  const onSaveResult=(id,a,b)=>{ store.saveMatch({id,resultA:a,resultB:b}); popToast("Resultado lançado · ranking atualizado"); };
  const onSaveOfficial=(d)=>{ store.saveOfficial(d); popToast("Oficiais salvos"); };
  const onImport=()=>{ OFFICIAL_FIXTURES.forEach(f=> store.saveMatch({...f})); popToast("Tabela oficial importada · "+OFFICIAL_FIXTURES.length+" jogos"); };
  const onProfileDone=(d)=> store.saveProfile(me,d);

  if(user===undefined) return <div className="auth"><div className="hero"><span className="ballmark">⚽</span><div className="sub">Carregando…</div></div></div>;
  if(!store.demo && user===null) return <Auth/>;
  if(profile===null){
    const jaSouParticipante = participants.some(p=>p.uid===me);
    if(!jaSouParticipante && participants.length >= MAX_PLAYERS) return <PoolFull/>;
    return <Onboarding onDone={onProfileDone}/>;
  }
  if(profile===undefined) return <div className="auth"><div className="hero"><span className="ballmark">⚽</span><div className="sub">Carregando…</div></div></div>;

  return (
    <>
      <div className="topbar">
        <div className="brand"><span className="logo"><BallArt size={28}/></span>
          <span className="wm"><span className="b1">BROS</span><span className="dot">.</span><span className="b2">lão</span></span></div>
        <nav className="nav">
          <button className={"navlink"+(tab==="home"?" active":"")} onClick={()=>setTab("home")}><span className="ti">🏟️</span>Home</button>
          <button className={"navlink"+(tab==="palpites"?" active":"")} onClick={()=>setTab("palpites")}><span className="ti">✍️</span>Palpites</button>
          <button className={"navlink"+(tab==="ranking"?" active":"")} onClick={()=>setTab("ranking")}><span className="ti">🏆</span>Ranking</button>
          <button className={"navlink"+(tab==="especiais"?" active":"")} onClick={()=>setTab("especiais")}><span className="ti">🔮</span>Especiais</button>
          <button className={"navlink"+(tab==="regras"?" active":"")} onClick={()=>setTab("regras")}><span className="ti">📋</span>Regras</button>
          {isAdmin && <button className={"navlink"+(tab==="admin"?" active":"")} onClick={()=>setTab("admin")}><span className="ti">🔧</span>Admin</button>}
        </nav>
        <div className="spacer"></div>
        <span className="chip wc">🏆 Copa 2026</span>
        {store.demo
          ? <span className="chip" style={{color:"var(--canarinho)",borderColor:"var(--canarinho)"}}>DEMO</span>
          : <button className="iconbtn" onClick={()=>store.signOut()}>Sair</button>}
      </div>

      {store.demo && <div className="wrap" style={{paddingBottom:0}}>
        <div className="banner">▶️ Modo demonstração com dados de exemplo (em memória, somem ao recarregar). Preencha o <b>firebaseConfig</b> no topo do arquivo para ativar o bolão real com login e ranking ao vivo.</div>
      </div>}

      {tab==="home" && <Home matches={matches} now={now} ranking={ranking} me={me}
        guessMap={guessMap} onSave={onSaveGuess} savedId={savedId}/>}
      {tab==="palpites" && <MyPage matches={matches} now={now} me={me} guessMap={guessMap}
        specialMap={specialMap} official={official} onSave={onSaveGuess} onSaveSpecial={onSaveSpecial} savedId={savedId}/>}
      {tab==="ranking" && <Ranking ranking={ranking} me={me} matches={matches} now={now}
        guessMap={guessMap} specialMap={specialMap} official={official}/>}
      {tab==="especiais" && <SpecialsBoard participants={participants} specialMap={specialMap}
        matches={matches} now={now} me={me}/>}
      {tab==="regras" && <Regras/>}
      {tab==="admin" && isAdmin && <Admin matches={matches} official={official}
        onImport={onImport} onSaveMatch={onSaveMatch} onDeleteMatch={onDeleteMatch} onSaveResult={onSaveResult} onSaveOfficial={onSaveOfficial}/>}

      <div style={{textAlign:"center",color:"var(--muted-2)",fontSize:"12px",padding:"26px 0 34px"}}>BROS<span style={{color:"var(--redlao)"}}>.lão</span> · {BUILD}</div>
      <Toast msg={toast}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
