<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#F4F1E9" />
<title>BROS.lão · Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- tema (aplica antes de pintar, evita flash) -->
<script>try{if(localStorage.getItem("broslao_theme")==="dark")document.documentElement.dataset.theme="dark";}catch(e){}</script>

<!-- React + Babel -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>

<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
:root{
  --night:#F4F1E9; --surface:#FBF9F3; --surface-2:#F1ECE0; --line:#E7E0D0;
  --chalk:#1F2318; --muted:#6E6A5C; --muted-2:#9C9686;
  --canarinho:#E3A008; --canarinho-deep:#C8871A; --green:#0E8A43;
  --celeste:#2E7BC4; --celeste-deep:#1F6FA8;
  --live:#C8452F; --gold:#C8871A;
  --redlao:#0E8A43; --dotblack:#1F2318;
  --blue:#2A54D6; --blue-deep:#1E42B8; --blue-soft:#E9EDFB; --amber:#C87B12;
  --r:16px;
}
html[data-theme="dark"]{
  color-scheme:dark;
  --night:#131412; --surface:#1D1E1B; --surface-2:#26271F; --line:#2E2F29;
  --chalk:#F3F1E8; --muted:#9C988A; --muted-2:#6E6B5E;
  --canarinho:#F0B429; --canarinho-deep:#F0B429; --green:#35C46E;
  --celeste:#5B9BE0; --celeste-deep:#5B9BE0; --live:#E0654E; --gold:#F0B429;
  --blue:#5B84F0; --blue-deep:#4A6FDB; --blue-soft:#1E2740; --amber:#E0954E;
  --dotblack:#F3F1E8; --redlao:#35C46E;
}
html[data-theme="dark"] .input,html[data-theme="dark"] select.input{background:#26271F}
html[data-theme="dark"] .scorebox,html[data-theme="dark"] .scorebox:disabled{background:#26271F;color:var(--chalk)}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--night);
  color:var(--chalk);
  font-family:'Space Grotesk','Inter',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
#root{max-width:1200px;margin:0 auto;padding:0 24px 64px}
h1,h2,h3,.disp{font-family:'Bricolage Grotesque','Archivo',sans-serif;letter-spacing:-.02em}

/* desktop layout helpers */
.matchgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.matchgrid .match{margin-bottom:0}
.groupsec{margin-bottom:26px}
.group-h{display:flex;align-items:center;gap:10px;margin:24px 2px 12px}
.group-h .gtag{font-family:'Archivo';font-weight:900;font-size:15px;color:#1a1300;background:var(--canarinho);
  width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.group-h h3{margin:0;font-size:14px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800}
.group-h .teams{font-size:12px;color:var(--muted-2);margin-left:auto;font-weight:600}
.narrow{max-width:780px;margin:0 auto}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:760px){
  #root{padding:0 14px 90px}
  .cols{grid-template-columns:1fr}
  .matchgrid{grid-template-columns:1fr}
}
.num{font-variant-numeric:tabular-nums;font-family:'Archivo',sans-serif}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
a{color:var(--celeste)}

/* ---------- Top bar + nav ---------- */
.topbar{position:sticky;top:0;z-index:30;background:var(--surface);
  border-bottom:2px solid transparent;border-image:linear-gradient(90deg,var(--green),var(--canarinho),var(--blue)) 1;
  padding:12px 0;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:center;gap:8px;font-family:'Bricolage Grotesque','Archivo';font-weight:800;font-size:22px;line-height:1;margin-right:10px}
.brand .logo{width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex:none}
.brand .wm{display:flex;align-items:baseline;gap:1px}
.brand .b1{color:var(--chalk)} .brand .dot{color:var(--dotblack)} .brand .b2{color:var(--redlao)}
.chip.wc{background:linear-gradient(95deg,#0E8C46,#12a655);color:#fff;border:none;display:inline-flex;align-items:center;gap:5px}
.topbar .spacer{flex:1}
.nav{display:flex;gap:4px}
.navlink{background:none;border:none;color:var(--muted);font-weight:700;font-size:14px;padding:9px 14px;border-radius:10px;display:flex;align-items:center;gap:7px}
.navlink:hover{color:var(--chalk);background:var(--surface-2)}
.navlink.active{color:#fff;background:var(--blue)}
.navlink.active:hover{background:var(--blue-deep)}
.navlink .ti{font-size:15px}
.chip{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:5px 9px;border-radius:99px;
  border:1px solid var(--line);color:var(--muted);background:var(--surface)}
.iconbtn{background:var(--surface);border:1px solid var(--line);color:var(--chalk);border-radius:10px;padding:8px 11px;font-size:13px;font-weight:600}
@media(max-width:760px){
  .topbar{flex-wrap:wrap;gap:8px 10px;padding:10px 0;justify-content:space-between}
  .topbar .spacer{display:none}
  .topbar .chip.wc{display:none}        /* selo decorativo sai no mobile p/ enxugar o topo */
  .brand{font-size:20px;margin-right:0}
  .brand .logo{width:26px;height:26px}
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:40;width:auto;order:0;justify-content:space-around;gap:2px;
    background:var(--surface);border-top:1px solid var(--line);
    padding:7px 6px calc(7px + env(safe-area-inset-bottom));box-shadow:0 -6px 18px rgba(0,0,0,.07)}
  .navlink{flex:1;min-width:0;flex-direction:column;align-items:center;gap:3px;
    padding:6px 2px;font-size:10px;border-radius:10px;white-space:nowrap;color:var(--muted)}
  .navlink .ti{font-size:20px}
  .nav .navlink.active{background:none;color:var(--green)}
  .nav .navlink.active:hover{background:none;color:var(--green)}
  .myrank{display:flex}
}

/* ---------- Layout ---------- */
.wrap{padding:18px 0 40px}
.sect-h{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 10px}
.sect-h:first-child{margin-top:8px}
.sect-h h2{font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800;margin:0}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 2px rgba(20,20,20,.04)}
.empty{border:1px dashed var(--line);border-radius:var(--r);padding:26px 18px;text-align:center;color:var(--muted);font-size:14px}

/* ---------- Match / Scoreboard card ---------- */
.match{background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);padding:13px 14px;margin-bottom:10px;position:relative;overflow:hidden;box-shadow:0 1px 2px rgba(20,20,20,.04)}
.match.live{border-color:rgba(255,93,93,.45);box-shadow:0 0 0 1px rgba(255,93,93,.25)}
.match-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.phase-tag{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--canarinho)}
.phase-tag .x{color:var(--muted)}
.status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--muted)}
.status .d{width:7px;height:7px;border-radius:99px;background:var(--muted-2)}
.status.open{color:var(--green)} .status.open .d{background:var(--green)}
.status.soon{color:var(--canarinho)} .status.soon .d{background:var(--canarinho)}
.status.locked{color:var(--muted)} .status.locked .d{background:var(--muted-2)}
.status.live{color:var(--live)} .status.live .d{background:var(--live);animation:pulse 1.1s infinite}
.status.done{color:var(--celeste)} .status.done .d{background:var(--celeste)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,93,93,.6)}70%{box-shadow:0 0 0 7px rgba(255,93,93,0)}100%{box-shadow:0 0 0 0 rgba(255,93,93,0)}}
.scoreline{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.team{display:flex;align-items:center;gap:9px;min-width:0}
.team.right{flex-direction:row-reverse;text-align:right}
.team .nm{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.flag{width:30px;height:22px;border-radius:4px;flex:none;background:var(--surface-2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden}
.center{display:flex;align-items:center;gap:7px}
.scorebox{width:46px;height:52px;border-radius:10px;background:#FAF8F2;border:1px solid var(--line);
  color:var(--chalk);font-size:26px;font-weight:900;text-align:center;font-family:'Archivo';font-variant-numeric:tabular-nums}
.scorebox:focus{outline:none;border-color:var(--canarinho);box-shadow:0 0 0 3px rgba(255,210,74,.18)}
.scorebox:disabled{opacity:1;background:#FAF8F2;color:var(--chalk)}
.score-x{color:var(--muted-2);font-weight:800;font-size:15px}
.team .tbd{font-size:11px;font-weight:800;color:var(--muted);line-height:1.25;max-width:120px;text-align:center}
.tbd-note{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line);font-size:11px;color:var(--muted);
  display:flex;align-items:center;gap:6px;justify-content:center;text-align:center}
.official{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
.official .lab{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.official .res{font-weight:900;font-family:'Archivo';color:var(--celeste);font-size:16px}
.match-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.kick{font-size:11px;color:var(--muted);font-weight:600}
.pts{font-size:11px;font-weight:800;padding:3px 8px;border-radius:99px}
.pts.pos{background:rgba(22,179,106,.15);color:var(--green)}
.pts.zero{background:var(--surface-2);color:var(--muted)}
.pts.pending{background:var(--surface-2);color:var(--muted-2)}
.savep{font-size:11px;color:var(--green);font-weight:700;opacity:0;transition:opacity .3s}
.savep.show{opacity:1}
.reg{font-size:11px;color:var(--muted);font-weight:600}
.reg b{color:var(--green);font-family:'Archivo';font-weight:900;font-size:13px}
.match.tappable{cursor:pointer}
.refhint{margin-left:auto;font-size:11px;font-weight:800;color:var(--blue);display:inline-flex;align-items:center;gap:3px}
.refteam-h{display:flex;align-items:center;gap:9px;font-family:'Archivo';font-weight:900;font-size:16px;margin:16px 0 6px}
.refrow{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
.refrow:last-child{border-bottom:none}
.rb{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:900;font-size:12px;color:#fff;flex:none}
.rb.V{background:var(--green)} .rb.E{background:var(--muted-2)} .rb.D{background:var(--live)}
.refscore{font-family:'Archivo';font-weight:900;font-variant-numeric:tabular-nums;font-size:16px}
.refopp{color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px;margin-left:auto}
.seeguesses{margin-left:auto;border:1px solid var(--line);background:var(--card);color:var(--blue);
  font-family:inherit;font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;cursor:pointer}
.seeguesses:hover{background:rgba(37,99,235,.08)}
.gtab{margin-top:14px;padding:14px 16px}
.gtab-h{font-family:'Archivo';font-weight:900;font-size:15px;margin-bottom:3px}
.gtab-sub{font-size:11.5px;color:var(--muted);margin-bottom:10px;line-height:1.4}
table.gt{width:100%;border-collapse:collapse;font-size:13px}
table.gt th{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:800;padding:4px 5px;text-align:center}
table.gt th.l{text-align:left;padding-left:2px}
table.gt td{padding:7px 5px;text-align:center;border-top:1px solid var(--line);font-variant-numeric:tabular-nums}
table.gt td.l{text-align:left;padding-left:2px}
table.gt td.pos{color:var(--muted);font-weight:800;width:20px}
table.gt td.pp{font-family:'Archivo';font-weight:900;color:var(--chalk)}
table.gt tr.q td.pos{color:var(--green)}
table.gt tr.q{box-shadow:inset 3px 0 0 var(--green)}
.gtteam{display:inline-flex;align-items:center;gap:8px}
.glist{display:flex;flex-direction:column;gap:1px}
.grow{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line)}
.grow:last-child{border-bottom:none}
.grow.cravou{background:rgba(34,197,94,.07);border-radius:8px}
.grow .gn{font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grow .gg{font-family:'Archivo';font-weight:900;font-variant-numeric:tabular-nums;min-width:46px;text-align:center}
.grow .gpt{font-family:'Archivo';font-weight:900;font-size:13px;min-width:48px;text-align:right}
.grow .gpt.pos{color:var(--green)} .grow .gpt.zero{color:var(--muted-2)}

/* ---------- Ranking ---------- */
.rank-hero{display:flex;gap:8px;overflow-x:auto;padding:2px 0 6px;-webkit-overflow-scrolling:touch}
.rank-hero::-webkit-scrollbar{display:none}
.podium{flex:none;width:108px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r);padding:12px 10px;text-align:center}
.podium.p1{border-color:var(--canarinho)}
.podium .pos{font-family:'Archivo';font-weight:900;font-size:13px;color:var(--muted)}
.podium.p1 .pos{color:var(--canarinho)}
.podium .nick{font-weight:700;font-size:13px;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.podium .tp{font-family:'Archivo';font-weight:900;font-size:22px;margin-top:2px}
.podium.p1{border-color:var(--canarinho);border-width:2px;box-shadow:0 8px 20px -12px rgba(227,160,8,.55)}
.pmedal{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:22px;padding:0 8px;border-radius:99px;font-family:'Archivo';font-weight:900;font-size:12px;background:var(--surface-2);color:var(--muted)}
.pmedal.m1{background:var(--canarinho);color:#3a2a02}
.pmedal.m2{background:#D9D4C6;color:#4a4636}
.pmedal.m3{background:#E4B483;color:#5c3a13}
.pmedal.lant{background:rgba(200,69,47,.14);color:var(--live)}
html[data-theme="dark"] .pmedal.m2{background:#3a3b34;color:#cfcabb}
html[data-theme="dark"] .pmedal.m3{background:#4a3a28;color:#e4b483}
.podium3{display:grid;grid-template-columns:1fr 1.12fr 1fr;gap:9px;align-items:end;margin-bottom:6px}
.trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:6px}
.podium3 .podium,.trio .podium{width:auto}
.podium3 .podium.p1{padding-top:20px}
.podium3 .podium.p1 .tp{font-size:26px}
.podium .crown{color:var(--canarinho-deep);display:flex;justify-content:center;margin:-2px 0 2px}
.topright{display:flex;align-items:center;gap:8px}
.myrank{display:none;flex-direction:column;align-items:center;line-height:1.05;gap:1px}
.myrank .pos{font-family:'Bricolage Grotesque','Archivo';font-weight:800;font-size:15px;color:var(--green);letter-spacing:-.01em}
.myrank .pts{font-size:11px;font-weight:700;color:var(--muted)}
.rrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer}
.rrow:last-child{border-bottom:none}
.rrow .rk{font-family:'Archivo';font-weight:900;font-size:15px;width:22px;color:var(--muted);text-align:center}
.rkwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;width:28px;flex:none}
.mv{font-family:'Archivo';font-weight:900;font-size:10px;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.2px}
.mv-up{color:var(--green)} .mv-down{color:var(--live)} .mv-flat{color:var(--muted-2);font-weight:700}
.rrow.me{box-shadow:inset 3px 0 0 var(--blue)}

/* ---------- Ranking zones ---------- */
.zone-h{display:flex;align-items:center;gap:9px;margin:22px 2px 10px}
.zone-h .zi{font-size:18px;display:inline-flex;align-items:center}
.zone-h.know .zi{color:var(--green)}
.zone-h.lay .zi{color:var(--live)}
.zone-h.mid .zi{color:var(--muted)}
.zone-h .zt{font-family:'Bricolage Grotesque','Archivo';font-weight:800;font-size:16px;letter-spacing:-.01em}
.zone-h .zs{margin-left:auto;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.zone-h.know .zt{color:var(--green)}
.zone-h.lay .zt{color:var(--live)}
.zone-h.mid .zt{color:var(--muted)}
.card.know{background:rgba(22,163,74,.09);border-color:rgba(22,163,74,.30)}
.card.lay{background:rgba(229,72,77,.08);border-color:rgba(229,72,77,.30)}
.card.know .rrow,.card.lay .rrow{border-bottom-color:rgba(20,20,20,.07)}
.rrow .info{flex:1;min-width:0}
.rrow .nm{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px}
.rrow .sub{font-size:11px;color:var(--muted);margin-top:2px}
.rrow .tot{font-family:'Archivo';font-weight:900;font-size:20px}
.you-pill{font-size:9px;font-weight:800;background:var(--canarinho);color:#1a1300;padding:2px 6px;border-radius:99px;letter-spacing:.04em}

/* ---------- Buttons / forms ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;
  font-weight:800;font-size:15px;padding:13px 18px;width:100%}
.btn.prim{background:var(--blue);color:#fff}
.btn.prim:active{background:var(--blue-deep)}
.btn.ghost{background:var(--surface-2);color:var(--chalk);border:1px solid var(--line)}
.btn.cel{background:var(--celeste);color:#04263b}
.btn.danger{background:rgba(255,93,93,.14);color:var(--live);border:1px solid rgba(255,93,93,.3)}
.btn.sm{font-size:13px;padding:9px 13px;width:auto}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.input,select.input{width:100%;background:#FAF8F2;border:1px solid var(--line);color:var(--chalk);
  border-radius:11px;padding:12px 13px;font-size:15px;font-weight:600}
.input:focus{outline:none;border-color:var(--celeste);box-shadow:0 0 0 3px rgba(79,176,232,.16)}
.varbox{margin-top:8px;border:1px solid var(--line);border-radius:11px;padding:8px 10px;background:var(--surface-2)}
.varrow{display:flex;align-items:center;gap:9px;padding:6px 4px;border-radius:8px;cursor:pointer;font-size:13px}
.varrow.on{background:rgba(22,163,74,.12)}
.varrow input{width:16px;height:16px;flex:none;accent-color:var(--green)}
.varrow .vdisp{flex:1;font-weight:600}
.varrow .vcount{font-family:'Archivo';font-weight:800;font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:99px;padding:1px 8px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ---------- Avatar ---------- */
.av{border-radius:99px;overflow:hidden;flex:none;background:var(--surface-2);border:1px solid var(--line)}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(8,12,22,.72);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:24px}
.sheet{background:var(--night);border:1px solid var(--line);border-radius:18px;
  width:100%;max-width:560px;max-height:88vh;overflow:auto;padding:22px 22px}
.sheet h2{margin:2px 0 14px;font-size:20px}
.grab{display:none}

/* ---------- Avatar picker ---------- */
.opts{display:flex;gap:7px;flex-wrap:wrap}
.opt{flex:1;min-width:0;background:#FAF8F2;border:1px solid var(--line);color:var(--chalk);
  border-radius:10px;padding:10px 8px;font-size:13px;font-weight:700;text-align:center}
.opt.on{border-color:var(--canarinho);background:rgba(255,210,74,.1);color:var(--chalk)}
.opt.on.cel{border-color:var(--celeste);background:rgba(79,176,232,.12)}

/* ---------- Auth ---------- */
.auth{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:30px 22px}
.auth .hero{text-align:center;margin-bottom:30px}
.auth .hero .big{font-family:'Archivo';font-weight:900;font-size:46px;line-height:.95}
.auth .hero .sub{color:var(--muted);margin-top:10px;font-size:14px}
.ballmark{font-size:40px;display:block;margin-bottom:6px}

/* ---------- misc ---------- */
.banner{background:rgba(79,176,232,.1);border:1px solid rgba(79,176,232,.3);color:var(--celeste);
  border-radius:12px;padding:11px 13px;font-size:12.5px;font-weight:600;margin:0 0 14px;display:flex;gap:8px;align-items:flex-start}
.note{font-size:12px;color:var(--muted);line-height:1.5}
.divider{height:1px;background:var(--line);margin:14px 0}
.adm-match{padding:11px 12px;border:1px solid var(--line);border-radius:12px;margin-bottom:9px;background:var(--surface)}
.adm-match .h{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:80;background:var(--surface-2);
  border:1px solid var(--line);color:var(--chalk);padding:11px 16px;border-radius:12px;font-weight:700;font-size:13px;
  box-shadow:0 8px 30px rgba(0,0,0,.4)}
.legend{font-size:11px;color:var(--muted);line-height:1.7;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.legend b{color:var(--chalk)}
.tabs-pill{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
.tabs-pill button{flex:1;border:none;background:none;color:var(--muted);font-weight:700;font-size:13px;padding:9px;border-radius:9px}
.tabs-pill button.on{background:var(--surface-2);color:var(--chalk)}

/* ---------- Predictions chrome (estilo referência) ---------- */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:6px 2px 14px;flex-wrap:wrap}
.toolbar .count{font-size:13px;color:var(--muted);font-weight:600}
.viewtoggle{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:3px}
.viewtoggle button{border:none;background:none;color:var(--muted);font-weight:700;font-size:13px;padding:7px 13px;border-radius:7px;display:flex;gap:6px;align-items:center}
.viewtoggle button.on{background:var(--blue-soft);color:var(--blue)}

.legendbar{display:flex;align-items:center;flex-wrap:wrap;gap:6px 14px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 16px;margin-bottom:16px}
.legendbar .ph{font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-right:2px}
.legendbar .it{font-size:13px;color:var(--muted);font-weight:600}
.legendbar .it b{font-family:'Archivo';font-weight:900;font-size:14px;margin-left:2px}
.legendbar .sp{flex:1;min-width:8px}
.legendbar .saved{font-size:12px;font-weight:800;padding:7px 12px;border-radius:9px;background:var(--surface-2);color:var(--muted);display:flex;gap:7px;align-items:center;white-space:nowrap}
.legendbar .saved.ok{background:rgba(22,163,74,.12);color:var(--green)}
.legendbar .saved.pend{background:rgba(217,119,6,.12);color:var(--amber)}

.phasetabs{display:flex;gap:2px;overflow-x:auto;border-bottom:1px solid var(--line);margin-bottom:16px}
.phasetabs::-webkit-scrollbar{display:none}
.phasetab{border:none;background:none;color:var(--muted);font-weight:700;font-size:14px;padding:11px 13px;white-space:nowrap;border-bottom:2px solid transparent;display:flex;gap:7px;align-items:center;cursor:pointer}
.phasetab .badge{font-size:11px;font-weight:800;background:var(--surface-2);color:var(--muted);padding:1px 7px;border-radius:99px}
.phasetab:hover{color:var(--chalk)}
.phasetab.on{color:var(--blue);border-bottom-color:var(--blue)}
.phasetab.on .badge{background:var(--blue-soft);color:var(--blue)}

.grouppills{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.gpill{width:38px;height:38px;border-radius:99px;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-family:'Archivo';font-weight:900;font-size:15px;cursor:pointer}
.gpill:hover{border-color:var(--blue)}
.gpill.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ---------- Match card (referência) ---------- */
.match-meta{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);font-weight:600;margin-bottom:13px;flex-wrap:wrap}
.match-meta .sep{color:var(--muted-2)}
.match-meta .cd{font-weight:800}
.match-meta .cd.live{color:var(--live)} .match-meta .cd.locked{color:var(--muted-2)} .match-meta .cd.open{color:var(--blue)}
.flagimg{width:27px;height:20px;border-radius:3px;box-shadow:0 0 0 1px var(--line);object-fit:cover;display:block;background:var(--surface-2)}
.tcode{font-family:'Archivo';font-weight:900;font-size:16px;letter-spacing:.02em;color:var(--chalk)}
.team .nm{display:none}

/* ---------- Flag dropdown ---------- */
.fsel{position:relative}
.fsel-btn{width:100%;display:flex;align-items:center;gap:9px;background:#FAF8F2;border:1px solid var(--line);
  border-radius:11px;padding:11px 13px;font-size:15px;font-weight:600;color:var(--chalk);cursor:pointer;text-align:left}
.fsel-btn:disabled{opacity:.55;cursor:default}
.fsel-btn .ph{color:var(--muted-2);font-weight:500}
.fsel-btn .caret{margin-left:auto;color:var(--muted);font-size:12px}
.fsel-menu{position:absolute;z-index:25;top:calc(100% + 5px);left:0;right:0;max-height:280px;overflow:auto;
  background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 34px rgba(20,20,20,.14);padding:6px}
.fsel-opt{width:100%;display:flex;align-items:center;gap:10px;background:none;border:none;color:var(--chalk);
  font-size:14px;font-weight:600;padding:9px 10px;border-radius:8px;text-align:left;cursor:pointer}
.fsel-opt:hover{background:var(--surface-2)}
.fsel-opt.on{background:var(--blue-soft);color:var(--blue)}

/* ---------- Login / Google ---------- */
.btn.google{background:#fff;color:#1f2533;border:1px solid var(--line);gap:10px}
.btn.google:hover{background:var(--surface-2)}
.or-div{display:flex;align-items:center;gap:12px;color:var(--muted-2);font-size:12px;font-weight:700;margin:14px 0}
.or-div::before,.or-div::after{content:"";height:1px;background:var(--line);flex:1}
.gicon{width:18px;height:18px;flex:none}
.keeprow{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--muted);font-weight:600;margin:2px 2px 14px;cursor:pointer}
.keeprow input{width:16px;height:16px;accent-color:var(--blue)}

/* ---------- Welcome screen ---------- */
.welcome{display:grid;grid-template-columns:1.1fr .9fr;min-height:100vh}
.welcome-left{position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 36px;background:radial-gradient(120% 120% at 30% 10%, #12a655 0%, #0a6e37 55%, #064d28 100%)}
.welcome-left .wart{width:min(340px,70%);filter:drop-shadow(0 18px 40px rgba(0,0,0,.35));position:relative;z-index:2}
.welcome-left .wtitle{position:relative;z-index:2;text-align:center;color:#fff;font-family:'Archivo';font-weight:900;
  font-size:34px;line-height:1.05;margin-top:26px;text-shadow:0 2px 14px rgba(0,0,0,.25)}
.welcome-left .wtitle .y{color:var(--canarinho)} .welcome-left .wtitle .r{color:#ff6a78}
.welcome-left .wsub{position:relative;z-index:2;color:rgba(255,255,255,.85);font-weight:600;margin-top:10px;font-size:14px}
.welcome-right{display:flex;align-items:center;justify-content:center;padding:40px 32px;background:var(--surface);
  opacity:0;transform:translateX(28px);animation:rightIn .6s ease .35s forwards}
@keyframes rightIn{to{opacity:1;transform:none}}
.welcome-card{width:100%;max-width:430px}
.welcome-card .eyebrow{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--blue)}
.welcome-card h2{font-family:'Archivo';font-weight:900;font-size:26px;margin:6px 0 4px}
.welcome-card .csub{color:var(--muted);font-size:14px;margin-bottom:20px}
.av-preview{display:flex;justify-content:center;margin:6px 0 18px}
@media(max-width:820px){
  .welcome{grid-template-columns:1fr}
  .welcome-left{min-height:300px;padding:36px 24px}
  .welcome-left .wtitle{font-size:26px}
  .welcome-right{animation-delay:.15s}
}

/* ---------- Confetti ---------- */
.confetti{position:absolute;top:0;left:0;bottom:0;width:55%;overflow:hidden;pointer-events:none;z-index:1}
.conf{position:absolute;top:-24px;width:9px;height:14px;border-radius:2px;opacity:0;animation:confFall linear infinite}
@keyframes confFall{
  0%{transform:translateY(-24px) rotate(0deg);opacity:0}
  8%{opacity:1}
  100%{transform:translateY(105vh) rotate(680deg);opacity:.9}
}

/* ---------- Login temático ---------- */
.login{display:grid;grid-template-columns:1.05fr .95fr;min-height:100vh}
.login-hero{position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;
  padding:56px 52px;color:#fff;background:radial-gradient(130% 130% at 18% 8%, #12a655 0%, #0a6e37 52%, #064d28 100%)}
.login-hero .lbrand{position:relative;z-index:2;font-family:'Archivo';font-weight:900;font-size:56px;line-height:.92}
.login-hero .lbrand .d{color:var(--canarinho)} .login-hero .lbrand .r{color:#ff6a78}
.login-hero .ltag{position:relative;z-index:2;margin-top:16px;font-size:16px;font-weight:600;color:rgba(255,255,255,.9);max-width:400px;line-height:1.5}
.login-hero .lfeat{position:relative;z-index:2;margin-top:26px;display:flex;flex-direction:column;gap:12px}
.login-hero .lfeat div{display:flex;gap:11px;align-items:center;font-weight:600;font-size:14.5px;color:rgba(255,255,255,.96)}
.login-art{position:absolute;right:-50px;bottom:-50px;opacity:.92;z-index:1;filter:drop-shadow(0 16px 32px rgba(0,0,0,.3))}
.login-form-wrap{display:flex;align-items:center;justify-content:center;padding:40px 30px;background:var(--surface)}
.login-form{width:100%;max-width:380px}
.login-form .fbrand{font-family:'Archivo';font-weight:900;font-size:28px;margin-bottom:2px}
.login-form .fbrand .d{color:var(--dotblack)} .login-form .fbrand .r{color:var(--redlao)}
.login-form .fsub{color:var(--muted);font-size:14px;margin-bottom:22px;font-weight:600}
@media(max-width:820px){
  .login{grid-template-columns:1fr}
  .login-hero{padding:40px 28px;min-height:auto}
  .login-hero .lbrand{font-size:42px}
  .login-art{width:160px;right:-30px;bottom:-30px}
}

/* ---------- Regras ---------- */
.rules-hero{display:flex;align-items:center;gap:16px;color:#fff;border-radius:16px;padding:20px 22px;margin:6px 0 20px;
  background:radial-gradient(130% 160% at 0% 0%, #12a655 0%, #0a6e37 70%)}
.rules-hero .rt{font-family:'Archivo';font-weight:900;font-size:23px;line-height:1.1}
.rules-hero .rs{color:rgba(255,255,255,.88);font-size:13px;font-weight:600;margin-top:4px}
.rsec-h{font-family:'Archivo';font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:22px 2px 11px;display:flex;align-items:center;gap:8px}
.rules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.rule-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:0 1px 2px rgba(20,20,20,.04)}
.rule-card .ic{font-size:22px;line-height:1;color:var(--green)}
.rule-card.gold .ic{color:var(--canarinho-deep)} .rule-card.zero .ic{color:var(--muted-2)}
.rule-card .big{font-family:'Archivo';font-weight:900;font-size:28px;margin-top:6px;color:var(--blue)}
.rule-card.gold .big{color:var(--canarinho-deep)} .rule-card.zero .big{color:var(--muted-2)}
.rule-card h4{font-family:'Archivo';font-weight:800;margin:2px 0 4px;font-size:15px}
.rule-card p{margin:0;color:var(--muted);font-size:12.5px;line-height:1.5}
.rtable{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;font-size:14px;box-shadow:0 1px 2px rgba(20,20,20,.04)}
.rtable th,.rtable td{padding:10px 12px;text-align:center;border-bottom:1px solid var(--line)}
.rtable th{background:var(--surface-2);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:800}
.rtable td{font-family:'Archivo';font-weight:800}
.rtable td:first-child,.rtable th:first-child{text-align:left}
.rtable td:first-child{font-family:'Inter';font-weight:700;font-size:13px}
.rtable tr:last-child td{border-bottom:none}
.rules-text{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px;color:var(--muted);font-size:13.5px;line-height:1.9;box-shadow:0 1px 2px rgba(20,20,20,.04)}
.rules-text b{color:var(--chalk)}

/* ---------- Home: zonas de destaque + jogos em andamento ---------- */
.hero-zones{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:6px}
.hero-zones .rank-hero{margin-top:2px}
.podium.lant{border-color:rgba(229,72,77,.45)}
.podium.lant .pos{color:var(--live)}
@media(max-width:760px){ .hero-zones{grid-template-columns:1fr} }

/* ---------- Rei/Rainha (cravada & consistência) ---------- */
.duo{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px}
.king{display:flex;align-items:center;gap:12px;border-radius:14px;padding:13px 15px;color:#fff;min-width:0}
.king.cravada{background:linear-gradient(120deg,#C8881A,#F2B705)}
.king.consist{background:linear-gradient(120deg,#1D4ED8,#4f8cf7)}
.king .ic{font-size:26px;line-height:1;flex:none}
.king .lab{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:rgba(255,255,255,.92)}
.king .who{font-family:'Archivo';font-weight:900;font-size:16px;line-height:1.2;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.king .ct{font-size:12px;color:rgba(255,255,255,.92);font-weight:700;margin-top:1px}
@media(max-width:760px){ .king{padding:11px 12px;gap:9px} .king .ic{font-size:22px} .king .who{font-size:14px} .king .lab{font-size:9.5px} }

.livecard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;
  box-shadow:0 1px 2px rgba(20,20,20,.04);position:relative;overflow:hidden}
.livecard.on{border-color:rgba(229,72,77,.4)}
.lc-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.lc-title{font-family:'Bricolage Grotesque','Archivo';font-weight:800;font-size:17px;letter-spacing:-.01em}
.lc-rows{display:flex;flex-direction:column}
.lc-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:14px}
.lc-row .nk{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.lc-right{display:flex;align-items:center;gap:8px;flex:none;margin-left:8px}
.traitor{font-size:10px;font-weight:800;background:rgba(229,72,77,.12);color:var(--live);
  border:1px solid rgba(229,72,77,.32);padding:3px 8px;border-radius:99px;white-space:nowrap;line-height:1}
.pacheco{font-size:10px;font-weight:800;background:rgba(242,183,5,.14);color:#9A7A00;
  border:1px solid rgba(242,183,5,.34);padding:3px 8px;border-radius:99px;white-space:nowrap;line-height:1}
html[data-theme="dark"] .pacheco{color:#F2C94C}
.lc-row .pl{font-family:'Archivo';font-weight:800;font-variant-numeric:tabular-nums;margin-left:10px}
.lc-row .pl.none{color:var(--muted-2);font-family:'Inter';font-weight:600}

/* ---------- Quadro de especiais (scroll horizontal) ---------- */
.sboard-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--surface);box-shadow:0 1px 2px rgba(20,20,20,.04);-webkit-overflow-scrolling:touch}
.sboard{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:13px}
.sboard th,.sboard td{padding:10px 13px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);white-space:nowrap;text-align:center}
.sboard tr:last-child td{border-bottom:none}
.sboard th:last-child,.sboard td:last-child{border-right:none}
.sboard thead th{position:sticky;top:0;z-index:3;background:var(--surface-2);font-family:'Archivo';font-weight:800;font-size:12.5px}
.sboard thead th.you{color:var(--blue)}
.sboard td.rowh,.sboard th.corner{position:sticky;left:0;background:var(--surface);text-align:left;font-family:'Archivo';font-weight:800;font-size:12.5px}
.sboard td.rowh{z-index:2;min-width:140px}
.sboard th.corner{z-index:5;background:var(--surface-2);text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-size:11px}
.sboard td.val{font-weight:600;min-width:120px}
.sboard td.val.empty{color:var(--muted-2);font-weight:500}
.sboard td.you-col{background:rgba(37,99,235,.05)}
.sboard .cellflag{display:inline-flex;align-items:center;gap:7px;justify-content:center}
.sboard td.val.hit{background:rgba(34,197,94,.16);font-weight:800}
.sboard td.val.hit.you-col{background:rgba(34,197,94,.22)}
.sboard td.val .hitpts{display:block;margin-top:2px;font-family:'Archivo';font-weight:900;font-size:10.5px;color:var(--green)}
.sboard td.rowh .offans{display:block;margin-top:3px;font-weight:800;font-size:11px;color:var(--celeste)}
.sboard td.rowh .offans img,.sboard td.rowh .offans .flag{vertical-align:middle;margin:0 2px}
.sboard tr.totrow td{border-top:2px solid var(--line)}
.sboard tr.totrow td.rowh{font-weight:900}
.sboard tr.totrow td.tot{font-family:'Archivo';font-weight:900;font-size:15px;color:var(--chalk)}

/* ---------- Campeão da rodada ---------- */
.round-champ{display:flex;align-items:center;gap:13px;color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:14px;
  background:radial-gradient(130% 170% at 0% 0%, #12a655 0%, #0a6e37 70%)}
/* ---------- Homenagem Messi ---------- */
.messi{position:relative;overflow:hidden;display:flex;align-items:center;gap:14px;color:#fff;border-radius:14px;padding:15px 17px;margin-bottom:14px;
  background:linear-gradient(135deg,#7BB0E4 0%,#5A93CE 52%,#3E79B8 100%)}
.messi::before{content:"";position:absolute;inset:0;opacity:.16;
  background:repeating-linear-gradient(90deg,#fff 0 14px,transparent 14px 30px)}
.messi>*{position:relative}
.messi .art{flex:none;width:64px;height:64px;display:flex;align-items:center;justify-content:center}
.messi .eyebrow{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.92)}
.messi .t{font-family:'Bricolage Grotesque','Archivo';font-weight:800;font-size:21px;line-height:1.1;letter-spacing:-.02em;margin-top:2px}
.messi .s{font-size:12.5px;color:rgba(255,255,255,.92);font-weight:600;margin-top:2px}
.messi .stars{position:absolute;top:11px;right:14px;display:flex;gap:3px;color:#FFD54A}
/* ---------- Homenagem Neymar (amarelinha) ---------- */
.neymar{background:linear-gradient(135deg,#1BA85A 0%,#0E8A43 55%,#0A6E37 100%)}
.neymar .stars{color:#FFDF00}
/* ---------- Churras da Final (celeste/Argentina) ---------- */
.churras{background:linear-gradient(135deg,#5EA0DA 0%,#3F80C0 55%,#2F6BA6 100%)}
.churras .stars{font-size:16px}
.churras .churemoji{font-size:44px;line-height:1}
.churras .sub2{display:block;margin-top:4px;font-style:italic;font-weight:600;font-size:11.5px;color:rgba(255,255,255,.82)}
.round-champ .ic{flex:none;width:48px;height:48px;border-radius:15px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#FFE08A}
.round-champ .t{font-family:'Archivo';font-weight:900;font-size:17px;line-height:1.15}
.round-champ .s{font-size:12.5px;color:rgba(255,255,255,.9);font-weight:600;margin-top:3px}
.daypills{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
.daypills::-webkit-scrollbar{display:none}
.daypill{flex:none;border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:8px 12px;color:var(--muted);
  font-family:'Archivo';cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px}
.daypill .dl{font-size:14px;font-weight:800}
.daypill .ds{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.daypill:hover{border-color:var(--blue)}
.daypill.on{background:var(--blue);border-color:var(--blue);color:#fff}
.daypill .ds.live{color:var(--live)} .daypill.on .ds{color:rgba(255,255,255,.85)}

/* ---------- Consenso do bolão (live cards) ---------- */
.cons{margin-bottom:12px;padding-bottom:13px;border-bottom:1px solid var(--line)}
.cons-lab{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);margin-bottom:8px}
.cons-winner{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cons-winner .w{font-family:'Archivo';font-weight:900;font-size:15px;display:flex;align-items:center;gap:7px}
.cons-winner .pc{font-family:'Archivo';font-weight:900;font-size:16px;color:var(--blue)}
.probbar{display:flex;height:10px;border-radius:99px;overflow:hidden;background:var(--surface-2)}
.probbar .seg{height:100%}
.probbar .a{background:var(--blue)} .probbar .d{background:var(--muted-2)} .probbar .b{background:var(--amber)}
.prob-ends{display:flex;justify-content:space-between;font-size:10px;font-weight:800;color:var(--muted);margin-top:5px}
.xg{display:flex;align-items:center;gap:7px;margin-top:12px;font-size:12px;color:var(--muted);font-weight:600}
.xg .v{font-family:'Archivo';font-weight:900;font-size:16px}
.xg .va{color:var(--blue)} .xg .vb{color:var(--amber)} .xg .dash{color:var(--muted-2)}
.scores{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.scl{display:flex;align-items:center;gap:9px;font-size:12px}
.scl .sc{font-family:'Archivo';font-weight:900;width:42px;font-variant-numeric:tabular-nums}
.scl .track{flex:1;height:7px;border-radius:99px;background:var(--surface-2);overflow:hidden}
.scl .fill{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),#5b8cf5);transition:width .4s ease}
.scl .fill.r0{background:linear-gradient(90deg,#15803D,#22C55E)}
.scl .fill.r1{background:linear-gradient(90deg,#D89E00,#F2B705)}
.scl .fill.r2{background:linear-gradient(90deg,#2563EB,#5B8CF5)}
.scl .pct{width:40px;text-align:right;color:var(--muted);font-weight:700}

</style>

// Mescla os jogos-base com os documentos do banco (resultados sobrescrevem; novos jogos são adicionados).
// Resolve os jogos de chaveamento: preenche teamA/teamB a partir do vencedor/perdedor do jogo de origem.
// Placar decide o vencedor; em empate (pênaltis), usa o campo 'winner' (definido no Admin).
function resolveBracket(list){
  const byId={}; list.forEach(m=> byId[m.id]=m);
  const winnerOf=(m)=>{ if(!m || m.resultA==null || m.resultB==null) return null;
    if(m.resultA>m.resultB) return m.teamA;
    if(m.resultB>m.resultA) return m.teamB;
    return m.winner||null;                         // empate → depende de 'quem avançou'
  };
  const loserOf=(m)=>{ const w=winnerOf(m); if(!w||!m) return null; return w===m.teamA? m.teamB : m.teamA; };
  const refTeam=(ref)=>{ if(!ref) return null; const L=ref.slice(0,2)==="L:"; const id=L?ref.slice(2):ref;
    const src=byId[id]; return L? loserOf(src) : winnerOf(src); };
  const refLabel=(ref)=>{ if(!ref) return "A definir"; const L=ref.slice(0,2)==="L:"; const id=L?ref.slice(2):ref;
    const src=byId[id]; if(!src) return "A definir";
    const a=src.teamA?teamInfo(src.teamA).c:"?", b=src.teamB?teamInfo(src.teamB).c:"?";
    return (L?"Perdedor ":"Vencedor ")+a+" × "+b;
  };
  for(let p=0;p<4;p++){                              // passes p/ resolver a cadeia quartas→semis→final/3º
    list.forEach(m=>{
      if(m.fromA){ const t=refTeam(m.fromA); if(t) m.teamA=t; if(!m.teamA) m.labelA=refLabel(m.fromA); }
      if(m.fromB){ const t=refTeam(m.fromB); if(t) m.teamB=t; if(!m.teamB) m.labelB=refLabel(m.fromB); }
    });
  }
  return list;
}

function mergeMatches(remote){
  const byId={};
  BASE_MATCHES.forEach(m=>{ byId[m.id]={...m}; });
  (remote||[]).forEach(r=>{
    byId[r.id] = byId[r.id] ? {...byId[r.id], ...r} : r;
  });
  return resolveBracket(Object.values(byId));
}

const SPECIAL_DEFS = [
  { key:"champion",  label:"Campeão",                 pts:30, ic:"trophy" },
  { key:"runnerUp",  label:"Vice-campeão",            pts:15, ic:"medal" },
  { key:"topScorer", label:"Artilheiro · Chuteira de Ouro", pts:20, ic:"boot" },

];

const LEADER_BONUS = 3;

// Normalização de nomes (ignora acento, pontuação, caixa e espaços extras) p/ especiais de texto.
const stripAccents=(s)=> String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"");
const normName=(s)=> stripAccents(s).toLowerCase().replace(/[.\-_'’]/g," ").replace(/\s+/g," ").trim();
const lastTok=(s)=>{ const t=normName(s).split(" ").filter(Boolean); return t.length? t[t.length-1] : ""; };
const TEXT_SPECIALS={topScorer:1, bestPlayer:1, bestGK:1};
// Acerto de um especial de texto: se o admin curou as grafias (acceptedList), ela manda;
// senão casa por igualdade normalizada OU pelo sobrenome (último token).
function textSpecialHit(pick, official, acceptedList){
  const p=normName(pick); if(!p) return false;
  if(acceptedList && acceptedList.length) return acceptedList.includes(p);
  const o=normName(official); if(!o) return false;
  if(p===o) return true;
  const lp=lastTok(p), lo=lastTok(o); return !!lp && lp===lo;
}

/* ============================================================
   3. MOTOR DE PONTUAÇÃO  (puro, derivado dos resultados oficiais)
   ============================================================ */
const sgn = n => n>0?1:(n<0?-1:0);

// Normaliza um placar para 1 dígito. O erro conhecido é dígito extra no fim
// (3→33, 3→30), então em valores >9 o 1º dígito é o que a pessoa quis.
const cleanScore = (v)=>{
  if(v==null || v==="") return v;
  let n=parseInt(v,10);
  if(isNaN(n)) return v;
  if(n<0) n=0;
  return n>9 ? +String(n)[0] : n;
};

// Pontos de UM jogo. Retorna {pts, exact, winner} ou null se sem palpite/sem resultado.
function scoreMatch(guess, m){
  if(!m || m.resultA==null || m.resultB==null) return null;        // sem resultado oficial
  if(!guess || guess.a==null || guess.b==null) return {pts:0, exact:false, winner:false}; // não palpitou
  const mult = (PHASES[m.phase]||PHASES.grupos).mult;
  const ga=+guess.a, gb=+guess.b, ra=+m.resultA, rb=+m.resultB;
  let base=0, exact=false, winner=false;
  if(ga===ra && gb===rb){ base=10; exact=true; winner=true; }
  else if((ga-gb)===(ra-rb)){ base=6; winner=true; }              // vencedor + saldo
  else if(sgn(ga-gb)===sgn(ra-rb)){ base=4; winner=true; }        // só vencedor/empate
  return { pts: base*mult, exact, winner };
}

// Agrega tudo de um participante.
function scoreParticipant(uid, matches, guessMap, special, official){
  let total=0, exactCount=0, winnerCount=0;
  const perMatch={};
  matches.forEach(m=>{
    const g = guessMap[uid+"_"+m.id];
    const r = scoreMatch(g, m);
    if(r){ total+=r.pts; if(r.exact)exactCount++; if(r.winner)winnerCount++; perMatch[m.id]=r; }
  });
  // especiais
  let championCorrect=false;
  if(official && official.specials){
    const acc = official.accepted||{};
    SPECIAL_DEFS.forEach(s=>{
      const my=(special&&special[s.key])||"";
      const off=official.specials[s.key]||"";
      const ok = TEXT_SPECIALS[s.key]
        ? textSpecialHit(my, off, acc[s.key])
        : (!!normName(off) && normName(off)===normName(my));
      if(ok){ total+=s.pts; if(s.key==="champion") championCorrect=true; }
    });
  }
  // líderes de grupo
  if(official && official.leaders && special && special.leaders){
    Object.keys(official.leaders).forEach(g=>{
      const off=normName(official.leaders[g]);
      const my=normName((special.leaders||{})[g]);
      if(off && my && off===my) total+=LEADER_BONUS;
    });
  }
  return { uid, total, exactCount, winnerCount, championCorrect, perMatch };
}

function buildRanking(participants, matches, guessMap, specialMap, official){
  return participants.map(p=>{
    const s=scoreParticipant(p.uid, matches, guessMap, specialMap[p.uid], official);
    return { ...p, ...s };
  }).sort((a,b)=>
    b.total-a.total ||
    b.exactCount-a.exactCount ||
    b.winnerCount-a.winnerCount ||
    (b.championCorrect?1:0)-(a.championCorrect?1:0) ||
    a.nickname.localeCompare(b.nickname)
  );
}

/* ---------- Rodadas (agrupadas por dia, BRT) ---------- */
const dayKeyOf = (iso)=> new Intl.DateTimeFormat("en-CA",{timeZone:"America/Sao_Paulo",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date(iso));
const dayLabelOf = (key)=>{ const p=key.split("-"); return p[2]+"/"+p[1]; };
function buildRounds(matches){
  const map={};
  matches.forEach(m=>{ const k=dayKeyOf(m.kickoffISO); (map[k]=map[k]||[]).push(m); });
  return Object.keys(map).sort().map(k=>({key:k,label:dayLabelOf(k),matches:map[k]}));
}
const roundDone = (rm)=> rm.length>0 && rm.every(m=> m.resultA!=null && m.resultB!=null);
function roundRanking(rm, people, guessMap){
  return people.map(p=>{
    let total=0,exactCount=0,winnerCount=0;
    rm.forEach(m=>{ const r=scoreMatch(guessMap[p.uid+"_"+m.id], m);
      if(r){ total+=r.pts; if(r.exact)exactCount++; if(r.winner)winnerCount++; } });
    return {...p,total,exactCount,winnerCount};
  }).sort((a,b)=> b.total-a.total || b.exactCount-a.exactCount || b.winnerCount-a.winnerCount || a.nickname.localeCompare(b.nickname));
}
function roundChampion(rm, people, guessMap){
  if(!roundDone(rm)) return null;
  const rk=roundRanking(rm,people,guessMap);
  if(!rk.length || rk[0].total<=0) return null;
  const top=rk[0].total;
  return { champs: rk.filter(p=>p.total===top), pts: top };
}

/* ============================================================
   4. TEMPO / TRAVAMENTO  (tudo em BRT na exibição)
   ============================================================ */
const fmtBRT = (iso)=> new Intl.DateTimeFormat("pt-BR",{
  timeZone:"America/Sao_Paulo", day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit"
}).format(new Date(iso));

function matchStatus(m, now){
  const kick = new Date(m.kickoffISO).getTime();
  const lock = kick - LOCK_MIN*60000;
  const done = m.resultA!=null && m.resultB!=null;
  if(done) return {key:"done", label:"Encerrado"};
  if(now >= kick) return {key:"live", label:"Em andamento"};
  if(now >= lock) return {key:"locked", label:"Palpites fechados"};
  const mins = Math.round((lock-now)/60000);
  if(mins <= 90) return {key:"soon", label:"Fecha em "+(mins<1?"<1":mins)+" min"};
  return {key:"open", label:"Palpites abertos"};
}
const isLocked = (m, now)=> now >= (new Date(m.kickoffISO).getTime() - LOCK_MIN*60000) || (m.resultA!=null);
const isStarted = (m, now)=> now >= new Date(m.kickoffISO).getTime() || (m.resultA!=null);
const specialsLockMs = ()=> new Date(SPECIALS_LOCK).getTime();      // até quando dá para editar
const specialsRevealMs = ()=> new Date(OPENING_KICKOFF).getTime();  // quando ficam visíveis a todos

const DEMO = String(firebaseConfig.apiKey).includes("COLE_AQUI");

function makeFirebaseStore(){
  firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth(), db=firebase.firestore();
  const sub=(coll,cb)=> db.collection(coll).onSnapshot(s=> cb(s.docs.map(d=>({id:d.id,...d.data()}))));
  return {
    demo:false,
    onAuth:(cb)=> auth.onAuthStateChanged(cb),
    setKeepLogged:(keep)=> auth.setPersistence(keep
      ? firebase.auth.Auth.Persistence.LOCAL
      : firebase.auth.Auth.Persistence.SESSION),
    signUp:(e,p)=> auth.createUserWithEmailAndPassword(e,p),
    signIn:(e,p)=> auth.signInWithEmailAndPassword(e,p),
    signOut:()=> auth.signOut(),
    subParticipants:(cb)=> sub("participants",cb),
    subMatches:(cb)=> sub("matches",cb),
    subGuesses:(cb)=> sub("guesses",cb),
    subSpecials:(cb)=> sub("specials",cb),
    subOfficial:(cb)=> db.collection("meta").doc("official").onSnapshot(d=> cb(d.exists?d.data():{})),
    saveProfile:(uid,d)=> db.collection("participants").doc(uid).set(d,{merge:true}),
    getProfile:(uid)=> db.collection("participants").doc(uid).get().then(s=> s.exists?{uid:s.id,...s.data()}:null),
    saveGuess:(uid,mId,g)=> db.collection("guesses").doc(uid+"_"+mId).set({uid,matchId:mId,...g},{merge:true}),
    saveSpecials:(uid,d)=> db.collection("specials").doc(uid).set(d,{merge:true}),
    saveMatch:(m)=>{ const ref=m.id?db.collection("matches").doc(m.id):db.collection("matches").doc();
      const {id,...rest}=m; return ref.set(rest,{merge:true}); },
    deleteMatch:(id)=> db.collection("matches").doc(id).delete(),
    saveOfficial:(d)=> db.collection("meta").doc("official").set(d,{merge:true}),
  };
}

    deleteMatch:(id)=>{state.matches=state.matches.filter(x=>x.id!==id);ping("matches");},
    saveOfficial:(d)=>{Object.assign(state.official[0],d);ping("official");},
  };
}

function countdownLabel(m, now){
  const kick=new Date(m.kickoffISO).getTime();
  if(m.resultA!=null) return null;
  if(now>=kick) return {t:"Ao vivo", c:"live"};
  if(now>=kick-LOCK_MIN*60000) return {t:"Fechado", c:"locked"};
  const ms=kick-now, d=Math.floor(ms/86400000), h=Math.floor((ms%86400000)/3600000), mm=Math.floor((ms%3600000)/60000);
  return {t: d>0 ? d+"d "+h+"h" : (h>0 ? h+"h "+mm+"min" : mm+"min"), c:"open"};
}

function MatchCard({m, now, guess, onSave, editable, ptResult, showSaved, allMatches, participants, guessMap}){
  const [a,setA]=useState(guess?.a ?? "");

  const editing=useRef(false);
  const [showRef,setShowRef]=useState(false);
  const [showGuesses,setShowGuesses]=useState(false);
  useEffect(()=>{ if(editing.current) return; setA(guess?.a ?? ""); setB(guess?.b ?? ""); },[guess?.a,guess?.b]);
  const resolved = !!(m.teamA && m.teamB);
  const locked = !editable || !resolved;
  const st=matchStatus(m,now);
  const ta=teamInfo(m.teamA), tb=teamInfo(m.teamB);
  const cd=countdownLabel(m,now);
  const venue = m.venue || VENUES[m.teamA+"|"+m.teamB];
  const oneDigit=(val)=> String(val).replace(/\D/g,"").slice(-1);   // 1 dígito; o último vence (evita 33/30)
  const commit=(na,nb)=>{ if(na!=="" && nb!=="" && na!=null && nb!=null) onSave(m.id,{a:+na,b:+nb}); };
  const canRef = !!allMatches && resolved;

  return (
    <div className={"match"+(st.key==="live"?" live":"")+(canRef?" tappable":"")}
      onClick={canRef?()=>setShowRef(true):undefined}>
      <div className="match-meta">

        {cd && <><span className="sep">·</span><span className={"cd "+cd.c}>{cd.t}</span></>}
        {venue && <><span className="sep">·</span><span><Icon name="pin" size="1em"/> {venue}</span></>}
        {canRef && <span className="refhint"><Icon name="chart" size="1em"/> retrospecto</span>}
      </div>

        <div className="team">
          {m.teamA ? <><span className="tcode">{ta.c}</span><Flag name={m.teamA}/></>
                   : <span className="tbd">{m.labelA||"A definir"}</span>}
        </div>
        <div className="center" onClick={e=>e.stopPropagation()}>
          {resolved ? <>
            <input className="scorebox num" inputMode="numeric" value={a} disabled={locked}
              onFocus={()=>editing.current=true} onBlur={()=>editing.current=false}
              onChange={e=>{const v=oneDigit(e.target.value);setA(v);commit(v,b);}} placeholder="–"/>
            <span className="score-x">-</span>
            <input className="scorebox num" inputMode="numeric" value={b} disabled={locked}
              onFocus={()=>editing.current=true} onBlur={()=>editing.current=false}

          </> : <span className="score-x">×</span>}

      {m.resultA!=null &&

          <span className="lab">Resultado oficial</span>
          <span className="res num">{m.resultA} × {m.resultB}</span>
          {participants && guessMap &&

        </div>}

/* Classificação simulada do grupo: usa resultado oficial quando há, senão o palpite do usuário */
function GroupTable({group, matches, guessMap, me}){
  const games=matches.filter(m=> m.phase==="grupos" && m.group===group);
  if(!games.length) return null;
  const teams=[...new Set(games.flatMap(g=>[g.teamA,g.teamB]))];
  const row={}; teams.forEach(t=> row[t]={team:t,P:0,J:0,V:0,E:0,D:0,gf:0,ga:0});
  let sim=0, oficiais=0;
  games.forEach(g=>{
    let ra=g.resultA, rb=g.resultB, isSim=false;
    if(ra==null||rb==null){
      const gu=guessMap[me+"_"+g.id];
      if(gu && gu.a!=null && gu.b!=null){ ra=+gu.a; rb=+gu.b; isSim=true; } else return;
    }
    isSim?sim++:oficiais++;
    const A=row[g.teamA], B=row[g.teamB];
    A.J++;B.J++;A.gf+=ra;A.ga+=rb;B.gf+=rb;B.ga+=ra;
    if(ra>rb){A.V++;B.D++;A.P+=3;} else if(ra<rb){B.V++;A.D++;B.P+=3;} else {A.E++;B.E++;A.P++;B.P++;}
  });
  const rows=teams.map(t=>({...row[t],sg:row[t].gf-row[t].ga}))
    .sort((x,y)=> y.P-x.P || y.sg-x.sg || y.gf-x.gf || x.team.localeCompare(y.team,"pt"));
  return (
    <div className="card narrow gtab">
      <div className="gtab-h"><Icon name="chart" size="1em"/> Classificação simulada · Grupo {group}</div>
      <div className="gtab-sub">Jogos sem resultado oficial usam o <b>seu palpite</b>. Os 2 primeiros avançam. ({oficiais} oficial{oficiais!==1?"s":""} · {sim} simulado{sim!==1?"s":""})</div>
      <table className="gt">
        <thead><tr><th></th><th className="l">Time</th><th>P</th><th>J</th><th>V</th><th>E</th><th>D</th><th>SG</th></tr></thead>
        <tbody>
          {rows.map((r,i)=>(
            <tr key={r.team} className={i<2?"q":""}>
              <td className="pos">{i+1}</td>
              <td className="l"><span className="gtteam"><Flag name={r.team}/> <b>{teamInfo(r.team).c}</b></span></td>
              <td className="pp">{r.P}</td><td>{r.J}</td><td>{r.V}</td><td>{r.E}</td><td>{r.D}</td>
              <td>{r.sg>0?"+"+r.sg:r.sg}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function LiveGuessCard({m, people, guessMap}){
  const ta=teamInfo(m.teamA), tb=teamInfo(m.teamB);
  const brMatch = m.teamA==="Brasil" || m.teamB==="Brasil";
  const isBrazilWin=(g)=>{ if(!g) return false; const a=+g.a, b=+g.b;
    return m.teamA==="Brasil" ? a>b : b>a; };
  const argMatch = m.teamA==="Argentina" || m.teamB==="Argentina";
  const isArgNotWin=(g)=>{ if(!g) return false; const a=+g.a, b=+g.b;   // derrota ou empate da Argentina
    return m.teamA==="Argentina" ? a<=b : b<=a; };
  const list=[...people]
    .map(p=>({nick:p.nickname, g:guessMap[p.uid+"_"+m.id]}))
    .sort((a,b)=> a.nick.localeCompare(b.nick,"pt"));
  const gs=list.map(x=>x.g).filter(Boolean);
  const n=gs.length;
  let aWin=0,draw=0,bWin=0,sumA=0,sumB=0; const sc={};
  gs.forEach(g=>{ const a=+g.a,b=+g.b; sumA+=a; sumB+=b;
    if(a>b)aWin++; else if(a<b)bWin++; else draw++;
    const k=a+"-"+b; sc[k]=(sc[k]||0)+1; });
  const pct=(x)=> n?Math.round(x/n*100):0;
  const aP=pct(aWin), dP=pct(draw), bP=n?Math.max(0,100-aP-dP):0;
  const topScores=Object.entries(sc).sort((x,y)=>y[1]-x[1]).slice(0,3);
  let winLab="", winPc=0, winFlag=null;
  if(n){
    if(aWin>=draw && aWin>=bWin){ winLab=ta.c; winPc=aP; winFlag=m.teamA; }
    else if(bWin>=aWin && bWin>=draw){ winLab=tb.c; winPc=bP; winFlag=m.teamB; }
    else { winLab="Empate"; winPc=dP; }
  }
  return (
    <div className="livecard on">
      <div className="lc-head">
        <span className="lc-title">{ta.c} × {tb.c}</span>
        <span className="status live"><span className="d"></span>Em andamento</span>
      </div>

      {n>0 &&
        <div className="cons">
          <div className="cons-lab">Favorito do bolão · {n} palpite{n>1?"s":""}</div>
          <div className="cons-winner">
            <span className="w">{winFlag && <Flag name={winFlag}/>} {winLab}</span>
            <span className="pc">{winPc}%</span>
          </div>
          <div className="probbar">
            <div className="seg a" style={{width:aP+"%"}}/>
            <div className="seg d" style={{width:dP+"%"}}/>
            <div className="seg b" style={{width:bP+"%"}}/>
          </div>
          <div className="prob-ends">
            <span>{ta.c} {aP}%</span><span>Empate {dP}%</span><span>{tb.c} {bP}%</span>
          </div>
          <div className="xg">Placar médio cravado:
            <span className="v"><span className="va">{(sumA/n).toFixed(1)}</span> <span className="dash">–</span> <span className="vb">{(sumB/n).toFixed(1)}</span></span>
          </div>
          {topScores.length>0 &&
            <div className="scores">
              {topScores.map(([k,c],i)=>(
                <div className="scl" key={k}>
                  <span className="sc">{k.replace("-"," - ")}</span>
                  <span className="track"><span className={"fill r"+i} style={{width:Math.round(c/n*100)+"%"}}/></span>
                  <span className="pct">{Math.round(c/n*100)}%</span>
                </div>
              ))}
            </div>}
        </div>}

      <div className="lc-rows">
        {list.map((x,i)=>{
          const traidor = brMatch && x.g && !isBrazilWin(x.g);
          const pacheco = argMatch && x.g && isArgNotWin(x.g);
          return (
            <div className="lc-row" key={i}>
              <span className="nk">{x.nick}</span>
              <span className="lc-right">
                {traidor && <span className="traitor">🐔 Traidor da Pátria</span>}
                {pacheco && <span className="pacheco">🇧🇷 Pacheco</span>}
                <span className={"pl"+(x.g?"":" none")}>{x.g ? x.g.a+" - "+x.g.b : "—"}</span>
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}
