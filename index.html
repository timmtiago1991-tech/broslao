function Admin({matches, official, participants, guessMap, specialMap, now, onSaveGuessFor, onImport, onSaveMatch, onDeleteMatch, onSaveResult, onSaveOfficial, toast}){
  const [tab,setTab]=useState("tabela");
  const groups=[...new Set(matches.filter(m=>m.phase==="grupos"&&m.group).map(m=>m.group))].sort();
  return (
    <div className="wrap narrow">
      <div className="banner"><Icon name="lock" size="1em"/> Painel do curador. O lançamento manual de resultados é a <b>fonte da verdade</b>: ao salvar um placar, o ranking recalcula sozinho.</div>
      <div className="tabs-pill">
        <button className={tab==="tabela"?"on":""} onClick={()=>setTab("tabela")}>Tabela & Resultados</button>
        <button className={tab==="oficiais"?"on":""} onClick={()=>setTab("oficiais")}>Especiais & Líderes</button>
        <button className={tab==="palpites"?"on":""} onClick={()=>setTab("palpites")}>Corrigir palpites</button>
      </div>
      {tab==="tabela" && <AdminMatches matches={matches} onImport={onImport} onSaveMatch={onSaveMatch}
        onDeleteMatch={onDeleteMatch} onSaveResult={onSaveResult}/>}
      {tab==="oficiais" && <AdminOfficial groups={groups} matches={matches} official={official}
        participants={participants} specialMap={specialMap} onSaveOfficial={onSaveOfficial}/>}
      {tab==="palpites" && <AdminGuesses matches={matches} participants={participants} guessMap={guessMap}
        now={now} onSaveGuessFor={onSaveGuessFor}/>}
    </div>
  );
}

function AdminGuesses({matches, participants, guessMap, now, onSaveGuessFor}){
  const people=[...participants].sort((a,b)=>(a.nickname||"").localeCompare(b.nickname||"","pt"));
  const games=[...matches].sort((x,y)=> new Date(y.kickoffISO)-new Date(x.kickoffISO)); // recentes primeiro
  const [pid,setPid]=useState("");
  const [mid,setMid]=useState("");
  const [a,setA]=useState(""); const [b,setB]=useState("");
  const cur = (pid&&mid) ? guessMap[pid+"_"+mid] : null;
  useEffect(()=>{ setA(cur&&cur.a!=null?String(cur.a):""); setB(cur&&cur.b!=null?String(cur.b):""); },[pid,mid]);
  const one=(v)=> String(v).replace(/\D/g,"").slice(-1);
  const save=()=>{ if(pid&&mid&&a!==""&&b!=="") onSaveGuessFor(pid,mid,{a:+a,b:+b}); };
  return (
    <>
      <div className="banner"><Icon name="pencil" size="1em"/> Edite o palpite de qualquer jogador, inclusive em jogos já em andamento. Use só para corrigir falhas — o ranking recalcula na hora.</div>
      <div className="field"><label>Jogador</label>
        <select className="input" value={pid} onChange={e=>setPid(e.target.value)}>
          <option value="">Selecione…</option>
          {people.map(p=><option key={p.uid} value={p.uid}>{p.nickname}</option>)}
        </select></div>
      <div className="field"><label>Jogo</label>
        <select className="input" value={mid} onChange={e=>setMid(e.target.value)}>
          <option value="">Selecione…</option>
          {games.map(m=><option key={m.id} value={m.id}>{teamInfo(m.teamA).c} × {teamInfo(m.teamB).c} · {fmtBRT(m.kickoffISO)} · {matchStatus(m,now).label}</option>)}
        </select></div>
      {pid && mid && <>
        <div className="note" style={{margin:"2px 2px 10px"}}>Palpite atual: <b style={{color:"var(--chalk)"}}>{cur&&cur.a!=null?cur.a+" - "+cur.b:"— (sem palpite)"}</b></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input className="input num" style={{width:60,textAlign:"center"}} inputMode="numeric" value={a}
            onChange={e=>setA(one(e.target.value))} placeholder="–"/>
          <span className="score-x">×</span>
          <input className="input num" style={{width:60,textAlign:"center"}} inputMode="numeric" value={b}
            onChange={e=>setB(one(e.target.value))} placeholder="–"/>
          <button className="btn prim" style={{flex:1}} disabled={a===""||b===""} onClick={save}>Salvar palpite</button>
        </div>
      </>}
    </>
  );
}

function AdminMatches({matches, onImport, onSaveMatch, onDeleteMatch, onSaveResult}){
  const blank={phase:"grupos",group:"",teamA:"",teamB:"",kickoffLocal:""};
  const [f,setF]=useState(blank);
  const sorted=[...matches].sort((x,y)=> new Date(x.kickoffISO)-new Date(y.kickoffISO));
  const hasMatches=matches.length>0;
  const add=()=>{
    if(!f.teamA||!f.teamB||!f.kickoffLocal){return;}
    onSaveMatch({phase:f.phase,group:f.group,teamA:f.teamA,teamB:f.teamB,
      kickoffISO:localToISO(f.kickoffLocal), resultA:null, resultB:null});
    setF(blank);
  };
  return (
    <>
      {!hasMatches &&
        <div className="card" style={{padding:16,marginBottom:16}}>
          <div style={{fontWeight:800,fontSize:16,marginBottom:4}}>Tabela oficial da fase de grupos</div>
          <div className="note" style={{marginBottom:12}}>Importe de uma vez os 72 jogos já divulgados (datas e horários em BRT, por grupo). Você ainda pode editar ou excluir qualquer jogo depois.</div>
          <button className="btn prim" onClick={()=>{ if(confirm("Importar os 72 jogos oficiais da fase de grupos?")) onImport(); }}>Importar tabela oficial (72 jogos)</button>
        </div>}
      {hasMatches &&
        <div className="note" style={{margin:"2px 2px 14px"}}>Tabela carregada com {matches.length} jogos. Use os campos abaixo para acrescentar mata-mata ou ajustar partidas.</div>}

            {PHASE_ORDER.map(k=><option key={k} value={k}>{PHASES[k].label} (×{PHASES[k].mult})</option>)}
          </select></div>
        <div className="row2">
          <div className="field"><label>Grupo (opcional)</label>
            <input className="input" value={f.group} onChange={e=>setF({...f,group:e.target.value.toUpperCase().slice(0,2)})} placeholder="A"/></div>
          <div className="field"><label>Início (BRT)</label>
            <input className="input" type="datetime-local" value={f.kickoffLocal} onChange={e=>setF({...f,kickoffLocal:e.target.value})}/></div>
        </div>
        <div className="row2">
          <div className="field"><label>Mandante</label>
            <input className="input" value={f.teamA} onChange={e=>setF({...f,teamA:e.target.value})} placeholder="Brasil"/></div>
          <div className="field"><label>Visitante</label>
            <input className="input" value={f.teamB} onChange={e=>setF({...f,teamB:e.target.value})} placeholder="Argentina"/></div>
        </div>
        <button className="btn prim" onClick={add}>Adicionar à tabela</button>
      </div>

      <div className="sect-h"><h2>Jogos cadastrados ({sorted.length})</h2></div>
      {sorted.length===0 && <div className="empty">Nenhum jogo ainda.</div>}
      {sorted.map(m=><AdminMatchRow key={m.id} m={m} onSaveResult={onSaveResult} onDeleteMatch={onDeleteMatch}/>)}
    </>
  );
}

function AdminMatchRow({m, onSaveResult, onDeleteMatch}){
  const [ra,setRa]=useState(m.resultA??"");
  const [rb,setRb]=useState(m.resultB??"");
  const [win,setWin]=useState(m.winner||"");
  const isKO = m.phase!=="grupos";
  const resolved = !!(m.teamA && m.teamB);
  const level = ra!=="" && rb!=="" && (+ra===+rb);
  return (
    <div className="adm-match">
      <div className="h">
        <span className="note">{(PHASES[m.phase]||PHASES.grupos).label}{m.group?" · G"+m.group:""} · {fmtBRT(m.kickoffISO)}</span>
        <button className="btn danger sm" onClick={()=>{if(confirm("Excluir este jogo?"))onDeleteMatch(m.id);}}>Excluir</button>
      </div>
      <div style={{fontWeight:700,marginBottom:9}}>{m.teamA||m.labelA||"?"} × {m.teamB||m.labelB||"?"}</div>
      {resolved ? <>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input className="input num" style={{width:60,textAlign:"center"}} inputMode="numeric" value={ra}
            onChange={e=>setRa(e.target.value.replace(/\D/g,"").slice(0,2))} placeholder="–"/>
          <span className="score-x">×</span>
          <input className="input num" style={{width:60,textAlign:"center"}} inputMode="numeric" value={rb}
            onChange={e=>setRb(e.target.value.replace(/\D/g,"").slice(0,2))} placeholder="–"/>
          <button className="btn cel sm" style={{flex:1}}
            onClick={()=>onSaveResult(m.id, ra===""?null:+ra, rb===""?null:+rb, win||null)}>
            {m.resultA!=null?"Atualizar resultado":"Lançar resultado"}
          </button>
        </div>
        {isKO &&
          <div style={{marginTop:9}}>
            <label className="note" style={{display:"block",marginBottom:4}}>
              Quem avançou{level?" — empate, defina o vencedor dos pênaltis":" (só usado em empate)"}:
            </label>
            <select className="input" value={win} onChange={e=>setWin(e.target.value)}>
              <option value="">Automático (pelo placar)</option>
              <option value={m.teamA}>{m.teamA}</option>
              <option value={m.teamB}>{m.teamB}</option>
            </select>
          </div>}
      </> : <div className="note">Aguardando o chaveamento definir os times.</div>}
    </div>
  );
}

function AdminOfficial({groups, matches, official, participants, specialMap, onSaveOfficial}){
  const [sp,setSp]=useState((official&&official.specials)||{});
  const [ld,setLd]=useState((official&&official.leaders)||{});
  const [acc,setAcc]=useState((official&&official.accepted)||{});
  useEffect(()=>{setSp((official&&official.specials)||{});setLd((official&&official.leaders)||{});
    setAcc((official&&official.accepted)||{});},[JSON.stringify(official)]);
  const COUNTRY = {champion:true, runnerUp:true};
  const teamsOf=(g)=> [...new Set((matches||[]).filter(m=>m.group===g).flatMap(m=>[m.teamA,m.teamB]))].sort((a,b)=>a.localeCompare(b,"pt"));
  // grafias distintas enviadas pelos participantes p/ um especial de texto
  const variantsOf=(key)=>{ const map={};
    (participants||[]).forEach(p=>{ const raw=((specialMap&&specialMap[p.uid])||{})[key]; const n=normName(raw);
      if(!n) return; if(!map[n]) map[n]={norm:n, display:String(raw).trim(), count:0}; map[n].count++; });
    return Object.values(map).sort((a,b)=> b.count-a.count || a.display.localeCompare(b.display,"pt"));
  };
  const defaultAccepted=(key)=> variantsOf(key).filter(v=> textSpecialHit(v.norm, sp[key], null)).map(v=>v.norm);
  const isChecked=(key,norm)=> acc[key] ? acc[key].includes(norm) : textSpecialHit(norm, sp[key], null);
  const toggle=(key,norm)=>{ let cur = acc[key] ? [...acc[key]] : defaultAccepted(key);
    cur = cur.includes(norm) ? cur.filter(x=>x!==norm) : [...cur, norm];
    setAcc({...acc,[key]:cur});
  };
  return (
    <>
      <div className="banner">Lance ao fim do torneio (especiais) e ao fim da fase de grupos (líderes). O motor soma automaticamente.</div>
      <div className="sect-h"><h2>Resultados especiais</h2></div>
      {SPECIAL_DEFS.map(s=>(
        <div className="field" key={s.key}>
          <label><Icon name={s.ic} size="1em"/> {s.label} · {s.pts} pts</label>
          {COUNTRY[s.key]
            ? <FlagSelect value={sp[s.key]||""} options={ALL_TEAMS}
                placeholder="Escolha a seleção" onChange={val=>setSp({...sp,[s.key]:val})}/>
            : <input className="input" value={sp[s.key]||""} onChange={e=>setSp({...sp,[s.key]:e.target.value})} placeholder="nome oficial"/>}
          {!COUNTRY[s.key] && variantsOf(s.key).length>0 &&
            <div className="varbox">
              <div className="note" style={{margin:"4px 0 6px"}}>Grafias enviadas — marque as que contam como acerto:</div>
              {variantsOf(s.key).map(v=>(
                <label key={v.norm} className={"varrow"+(isChecked(s.key,v.norm)?" on":"")}>
                  <input type="checkbox" checked={isChecked(s.key,v.norm)} onChange={()=>toggle(s.key,v.norm)}/>
                  <span className="vdisp">{v.display||"(vazio)"}</span>
                  <span className="vcount">{v.count}</span>
                </label>
              ))}
            </div>}
        </div>
      ))}
      {groups.length>0 && <>
        <div className="sect-h"><h2>Líderes de grupo</h2></div>
        {groups.map(g=>(
          <div className="field" key={g}><label>Líder do Grupo {g}</label>
            <FlagSelect value={ld[g]||""} options={teamsOf(g)}
              placeholder="Escolha a seleção do grupo" onChange={val=>setLd({...ld,[g]:val})}/></div>
        ))}
      </>}
      <button className="btn prim" onClick={()=>onSaveOfficial({specials:sp,leaders:ld,accepted:acc})}>Salvar oficiais</button>
    </>
  );
}

// datetime-local (sem fuso) -> ISO com offset BRT (-03:00)

function isoToLocal(iso){

}

  const colors=["#FFD400","#FFE45C","#0E8C46","#16B36A","#FFC72C","#0a6e37"];
  const pieces=useMemo(()=> Array.from({length:n},(_,i)=>({
    left: Math.random()*52,
    delay: -Math.random()*6,
    dur: 3.4+Math.random()*3.2,
    bg: colors[i%colors.length],
    w: 7+Math.random()*6,
    h: 10+Math.random()*8,

function SpecialsBoard({participants, specialMap, matches, now, me, isAdmin, official, onAdminSaveSpecial}){
  const [selUid,setSelUid]=useState("");
  const revealMs = specialsRevealMs();
  const revealed = now >= revealMs;
  const groups=[...new Set(matches.filter(m=>m.phase==="grupos"&&m.group).map(m=>m.group))].sort();
  const cols=[...participants].sort((a,b)=> a.nickname.localeCompare(b.nickname,"pt"));
  const norm=(x)=>(x||"").trim().toLowerCase();
  const offOf=(row)=> row.leader ? ((official&&official.leaders&&official.leaders[row.leader])||"")
                                 : ((official&&official.specials&&official.specials[row.key])||"");
  const rows=[
    ...SPECIAL_DEFS.map(s=>({key:s.key, label:s.label.split(" · ")[0], ic:s.ic, pts:s.pts, country:(s.key==="champion"||s.key==="runnerUp")})),
    ...groups.map(g=>({key:"L"+g, leader:g, label:"Líder "+g, ic:"flag", pts:LEADER_BONUS, country:true})),
  ];
  const cellVal=(p,row)=>{ const sp=specialMap[p.uid]||{};
    return row.leader ? ((sp.leaders||{})[row.leader]||"") : (sp[row.key]||""); };
  const isHit=(p,row)=>{ const pick=cellVal(p,row);
    if(row.leader || row.country){ const o=normName(offOf(row)), v=normName(pick); return !!o && !!v && o===v; }
    return textSpecialHit(pick, offOf(row), (official&&official.accepted&&official.accepted[row.key]));
  };
  const totalOf=(p)=> rows.reduce((t,row)=> t + (isHit(p,row)?row.pts:0), 0);
  const anyOfficial = rows.some(row=> norm(offOf(row)));

  const adminPanel = isAdmin ? (
    <div className="card narrow" style={{marginBottom:16,padding:"14px 18px",overflow:"visible"}}>
      <div className="sect-h" style={{marginTop:0}}><h2><Icon name="wrench" size="1em"/> Curador · editar especiais</h2></div>
      <div className="note" style={{marginBottom:10}}>Escolha um participante para editar os palpites especiais dele — mesmo após o fechamento.</div>
      <div className="field" style={{marginBottom:selUid?14:0}}>
        <label>Participante</label>
        <select className="input" value={selUid} onChange={e=>setSelUid(e.target.value)}>
          <option value="">— escolha um participante —</option>
          {cols.map(p=><option key={p.uid} value={p.uid}>{p.nickname}</option>)}
        </select>
      </div>
      {selUid && <Specials defs={SPECIAL_DEFS} groups={groups} matches={matches}
        value={specialMap[selUid]||{}} locked={false} official={official}
        adminName={(participants.find(p=>p.uid===selUid)||{}).nickname||""}
        onSave={d=>onAdminSaveSpecial(selUid,d)}/>}
    </div>
  ) : null;

  if(!revealed){
    return (
      <div className="wrap narrow">
        {adminPanel}
        <div className="rules-hero"><BallArt size={60}/>
          <div><div className="rt">Especiais de todos</div>
            <div className="rs">Revelados quando a bola rolar no primeiro jogo.</div></div></div>
        <div className="empty"><Icon name="lock" size="1em"/> Os palpites especiais de todo mundo ficam visíveis a partir do <b>início do primeiro jogo</b>
          {" ("+fmtBRT(OPENING_KICKOFF)+" BRT)"}.
          <br/>Até lá, cada um enxerga apenas os seus, na aba Palpites.</div>
      </div>
    );
  }
  return (
    <div className="wrap">
      {adminPanel}
      <div className="sect-h"><h2>Palpites especiais de todos</h2><span className="note">{cols.length} participantes</span></div>
      <div className="sboard-wrap">
        <table className="sboard">
          <thead>
            <tr>
              <th className="corner">Palpite</th>
              {cols.map(p=><th key={p.uid} className={p.uid===me?"you":""}>{p.nickname}</th>)}
            </tr>
          </thead>
          <tbody>
            {rows.map(row=>{ const off=offOf(row);
              return (
              <tr key={row.key}>
                <td className="rowh"><Icon name={row.ic} size="1em"/> {row.label}
                  {off ? <span className="offans"><Icon name="check" size="1em"/> {row.country ? <><Flag name={off}/> {off}</> : off}</span> : null}
                </td>
                {cols.map(p=>{ const v=cellVal(p,row); const hit=isHit(p,row);
                  return (
                    <td key={p.uid} className={"val"+(v?"":" empty")+(p.uid===me?" you-col":"")+(hit?" hit":"")}>
                      {v ? (row.country ? <span className="cellflag"><Flag name={v}/> {v}</span> : v) : "—"}
                      {hit && <span className="hitpts">+{row.pts}</span>}
                    </td>
                  );
                })}
              </tr>
            );})}
            {anyOfficial &&
              <tr className="totrow">
                <td className="rowh"><Icon name="medal" size="1em"/> Pontos especiais</td>
                {cols.map(p=> <td key={p.uid} className={"val tot"+(p.uid===me?" you-col":"")}>{totalOf(p)}</td>)}
              </tr>}
          </tbody>
        </table>
      </div>
      <div className="legend" style={{marginTop:12}}>
        Em <b style={{color:"var(--green)"}}>verde</b>, quem acertou o resultado oficial (com os pontos). A linha final soma os pontos de especiais de cada um. Tudo isso já entra no ranking automaticamente.
      </div>
    </div>
  );
}

/* ---------- AUTH (modo real) ---------- */
function Auth(){
  const seen = (()=>{ try{ return !!localStorage.getItem("broslao_acct"); }catch(e){ return false; } })();
  const [mode,setMode]=useState(seen ? "in" : "up");   // máquina nova → criar conta
  const [email,setEmail]=useState(""); const [pass,setPass]=useState(""); const [err,setErr]=useState("");
  const [keep,setKeep]=useState(true); const [busy,setBusy]=useState(false);
  const remember=()=>{ try{ localStorage.setItem("broslao_acct","1"); }catch(e){} };
  const signup = mode==="up";
  const go=async()=>{
    const mail=email.trim();
    if(!mail || !pass){ setErr("Preencha e-mail e senha."); return; }
    if(signup && pass.length<6){ setErr("A senha precisa ter ao menos 6 caracteres."); return; }
    setErr(""); setBusy(true);
    try{ await store.setKeepLogged(keep); }catch(e){ /* persistência é opcional, não bloqueia */ }
    try{
      signup ? await store.signUp(mail,pass) : await store.signIn(mail,pass);
      remember();
    }catch(e){ setErr(traduzErro(e.code||e.message)); }
    setBusy(false);
  };
  return (
    <div className="login">
      <div className="login-hero">
        <Confetti n={26}/>
        <div className="lbrand">BROS<span className="d">.</span><span className="r">lão</span></div>
        <div className="ltag">O bolão da Copa do Mundo 2026 entre amigos. Crave os placares, dispute os especiais e suba no ranking.</div>
        <div className="lfeat">
          <div><Icon name="trophy" size="1em"/> 104 jogos — da fase de grupos à final</div>
          <div><Icon name="flag" size="1em"/> Campeão, artilheiro e líderes de grupo</div>
          <div><Icon name="chart" size="1em"/> Ranking ao vivo: Conhecedores x Leigos</div>
        </div>
        <div className="login-art"><BallArt size={300}/></div>
      </div>
      <div className="login-form-wrap">
        <div className="login-form">
          <div className="fbrand">BROS<span className="d">.</span><span className="r">lão</span></div>
          <div className="fsub">{signup ? "Primeiro acesso · crie sua conta" : "Bem-vindo de volta · entre na sua conta"}</div>
          <div className="field"><label>E-mail</label>
            <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)}
              placeholder="voce@email.com"/></div>
          <div className="field"><label>{signup?"Crie uma senha":"Senha"}</label>
            <input className="input" type="password" value={pass} onChange={e=>setPass(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") go(); }}
              placeholder={signup?"mínimo 6 caracteres":"••••••"}/></div>
          <label className="keeprow"><input type="checkbox" checked={keep} onChange={e=>setKeep(e.target.checked)}/> Manter conectado neste aparelho</label>
          {err && <div className="banner" style={{background:"rgba(229,72,77,.1)",borderColor:"rgba(229,72,77,.3)",color:"var(--live)"}}>{err}</div>}
          <button className="btn prim" onClick={go} disabled={busy} style={{marginTop:4,opacity:busy?.6:1}}>
            {busy ? "Aguarde…" : (signup?"Criar conta e entrar":"Entrar")}</button>
          <button className="btn ghost" style={{marginTop:10}} onClick={()=>{ setErr(""); setMode(signup?"in":"up"); }}>
            {signup?"Já tenho conta · Entrar":"Primeiro acesso? Criar conta"}</button>
        </div>
      </div>
    </div>
  );
}
function traduzErro(c){
  c = String(c||"");
  if(/email-already/.test(c))return "Esse e-mail já tem conta. Use 'Já tenho conta · Entrar'.";
  if(/weak-password/.test(c))return "Senha muito curta (mín. 6 caracteres).";
  if(/invalid-credential|wrong-password|user-not-found/.test(c))return "E-mail ou senha incorretos.";
  if(/invalid-email/.test(c))return "E-mail inválido.";
  if(/operation-not-allowed|configuration-not-found/.test(c))return "Login por e-mail/senha não está ativado no Firebase. Ative em Authentication → Sign-in method → Email/Password.";
  if(/network-request-failed/.test(c))return "Falha de conexão. Verifique a internet e tente de novo.";
  if(/too-many-requests/.test(c))return "Muitas tentativas. Aguarde um momento e tente de novo.";
  return "Não foi possível entrar. Tente de novo. (" + c.replace("auth/","") + ")";
}

/* ============================================================
   8. APP
   ============================================================ */
function ThemeToggle(){
  const [dark,setDark]=useState(()=>{ try{ return document.documentElement.dataset.theme==="dark"; }catch(e){ return false; } });
  const toggle=()=>{ const nx=!dark; setDark(nx);
    try{ document.documentElement.dataset.theme = nx?"dark":""; localStorage.setItem("broslao_theme", nx?"dark":"light"); }catch(e){} };
  return <button className="iconbtn" onClick={toggle} title={dark?"Modo claro":"Modo escuro"} aria-label="Alternar tema">{dark?<Icon name="sun"/>:<Icon name="moon"/>}</button>;
}

function MyRank({ranking, me}){
  const idx = ranking.findIndex(p=>p.uid===me);
  if(idx<0) return null;
  const p = ranking[idx];
  return (
    <div className="myrank">
      <span className="pos">{idx+1}º lugar</span>
      <span className="pts">{p.total} pts</span>
    </div>
  );
}

function App(){
  const [user,setUser]=useState(undefined);     // undefined=carregando, null=deslogado
  const [profile,setProfile]=useState(undefined);
  const [participants,setParticipants]=useState([]);
  const [pLoaded,setPLoaded]=useState(false);   // participantes já carregados do banco?
  const [matches,setMatches]=useState(()=>mergeMatches([]));   // já começa com os 72 jogos-base
  const [guesses,setGuesses]=useState([]);
  const [specials,setSpecials]=useState([]);
  const [official,setOfficial]=useState({});
  const [tab,setTab]=useState("home");
  const [now,setNow]=useState(Date.now());
  const [savedId,setSavedId]=useState(null);
  const [toast,setToast]=useState("");

  useEffect(()=> store.onAuth(u=> setUser(u||null)),[]);
  useEffect(()=>{ store.setKeepLogged(true).catch(()=>{}); },[]);   // mantém sessão por padrão (menos re-login)
  useEffect(()=>{ const t=setInterval(()=>setNow(Date.now()),20000); return ()=>clearInterval(t); },[]);
  useEffect(()=>{
    const subs=[store.subParticipants(d=>{ setParticipants(d.map(p=>({uid:p.id||p.uid,...p}))); setPLoaded(true); }),
      store.subMatches(d=>setMatches(mergeMatches(d))), store.subGuesses(setGuesses),
      store.subSpecials(setSpecials), store.subOfficial(setOfficial)];
    const safety=setTimeout(()=>setPLoaded(true),5000); // não trava se o banco demorar
    return ()=>{ subs.forEach(u=>u&&u()); clearTimeout(safety); };
  },[]);

  // perfil: leitura DIRETA e autoritativa do doc do usuário → não mostra "montar avatar" à toa
  useEffect(()=>{
    if(!user){ setProfile(undefined); return; }
    let alive=true; setProfile(undefined);
    store.getProfile(user.uid)
      .then(p=>{ if(alive) setProfile(p); })                       // objeto = tem perfil; null = novo
      .catch(()=>{ if(alive) setProfile(prev=> prev===undefined ? null : prev); });
    return ()=>{ alive=false; };
  },[user]);
  // auto-heal: se a lista de participantes traz o usuário, promove para perfil (cobre cache/offline)
  useEffect(()=>{
    if(!user) return;
    const lp=participants.find(x=>x.uid===user.uid);
    if(lp) setProfile(prev=> (prev && prev.uid) ? prev : lp);
  },[user,participants]);

  const guessMap=useMemo(()=>{const m={};guesses.forEach(g=>m[(g.uid)+"_"+(g.matchId)]={...g, a:cleanScore(g.a), b:cleanScore(g.b)});return m;},[guesses]);
  const specialMap=useMemo(()=>{const m={};specials.forEach(s=>m[s.uid||s.id]=s);return m;},[specials]);
  const ranking=useMemo(()=>buildRanking(participants,matches,guessMap,specialMap,official),
    [participants,matches,guessMap,specialMap,official]);
  const isAdmin = store.demo || (user && ADMIN_EMAILS.map(e=>e.toLowerCase()).includes((user.email||"").toLowerCase()));
  const me = user?.uid;

  const flash=(id)=>{ setSavedId(id); setTimeout(()=>setSavedId(s=>s===id?null:s),1600); };
  const popToast=(t)=>{ setToast(t); setTimeout(()=>setToast(""),2200); };

  const onSaveGuess=async(mId,g)=>{
    const clean={a:cleanScore(g.a), b:cleanScore(g.b)};
    try{ await store.saveGuess(me,mId,clean); flash(mId); }
    catch(e){ popToast("⚠️ Não consegui salvar o palpite. Verifique a conexão."); }
  };
  const onSaveSpecial=async(d)=>{
    try{ await store.saveSpecials(me,d); }
    catch(e){ popToast("⚠️ Não consegui salvar. Tente de novo."); }
  };
  const onAdminSaveSpecial=async(uid,d)=>{
    try{ await store.saveSpecials(uid,d);
      popToast("Especiais de "+((participants.find(p=>p.uid===uid)||{}).nickname||"jogador")+" atualizados"); }
    catch(e){ popToast("⚠️ Falha ao salvar. Publique as regras de admin para specials."); }
  };
  const onSaveMatch=(m)=>{ store.saveMatch(m); popToast("Jogo salvo"); };
  const onDeleteMatch=(id)=>{ store.deleteMatch(id); popToast("Jogo excluído"); };
  const onSaveResult=(id,a,b,winner)=>{ store.saveMatch({id,resultA:a,resultB:b,winner:winner||null}); popToast("Resultado lançado · ranking atualizado"); };
  const onSaveOfficial=(d)=>{ store.saveOfficial(d); popToast("Oficiais salvos"); };
  const onAdminSaveGuess=async(uid,mId,g)=>{
    const clean={a:cleanScore(g.a), b:cleanScore(g.b)};
    try{ await store.saveGuess(uid,mId,clean); popToast("Palpite do jogador atualizado · ranking recalculado"); }
    catch(e){ popToast("⚠️ Falha ao atualizar. Publique as regras de admin para guesses."); }
  };
  const onImport=()=>{ OFFICIAL_FIXTURES.forEach(f=> store.saveMatch({...f})); popToast("Tabela oficial importada · "+OFFICIAL_FIXTURES.length+" jogos"); };
  const onProfileDone=(d)=> Promise.resolve(store.saveProfile(me,d)).then(()=> setProfile({uid:me,...d}));

  if(user===undefined) return <div className="auth"><div className="hero"><span className="ballmark"><Icon name="ball" size="40"/></span><div className="sub">Carregando…</div></div></div>;
  if(!store.demo && user===null) return <Auth/>;
  if(profile===null){
    const jaSouParticipante = participants.some(p=>p.uid===me);
    if(!jaSouParticipante && participants.length >= MAX_PLAYERS) return <PoolFull/>;
    return <Onboarding onDone={onProfileDone}/>;
  }
  if(profile===undefined) return <div className="auth"><div className="hero"><span className="ballmark"><Icon name="ball" size="40"/></span><div className="sub">Carregando…</div></div></div>;

  return (
    <>
      <div className="topbar">
        <div className="brand"><span className="logo"><BallArt size={28}/></span>
          <span className="wm"><span className="b1">BROS</span><span className="dot">.</span><span className="b2">lão</span></span></div>
        <nav className="nav">
          <button className={"navlink"+(tab==="home"?" active":"")} onClick={()=>setTab("home")}><span className="ti"><Icon name="home"/></span>Home</button>
          <button className={"navlink"+(tab==="palpites"?" active":"")} onClick={()=>setTab("palpites")}><span className="ti"><Icon name="pencil"/></span>Palpites</button>
          <button className={"navlink"+(tab==="ranking"?" active":"")} onClick={()=>setTab("ranking")}><span className="ti"><Icon name="trophy"/></span>Ranking</button>
          <button className={"navlink"+(tab==="especiais"?" active":"")} onClick={()=>setTab("especiais")}><span className="ti"><Icon name="star"/></span>Especiais</button>
          <button className={"navlink"+(tab==="regras"?" active":"")} onClick={()=>setTab("regras")}><span className="ti"><Icon name="book"/></span>Regras</button>
          {isAdmin && <button className={"navlink"+(tab==="admin"?" active":"")} onClick={()=>setTab("admin")}><span className="ti"><Icon name="wrench"/></span>Admin</button>}
        </nav>
        <MyRank ranking={ranking} me={me}/>
        <div className="spacer"></div>
        <span className="chip wc"><Icon name="trophy" size="1em"/> Copa 2026</span>
        <div className="topright">
          <ThemeToggle/>
          {store.demo
            ? <span className="chip" style={{color:"var(--canarinho)",borderColor:"var(--canarinho)"}}>DEMO</span>
            : <button className="iconbtn" onClick={()=>store.signOut()}>Sair</button>}
        </div>
      </div>

      {store.demo && <div className="wrap" style={{paddingBottom:0}}>
        <div className="banner"><Icon name="play" size="1em"/> Modo demonstração com dados de exemplo (em memória, somem ao recarregar). Preencha o <b>firebaseConfig</b> no topo do arquivo para ativar o bolão real com login e ranking ao vivo.</div>
      </div>}

      {tab==="home" && <Home matches={matches} now={now} ranking={ranking} me={me}
        guessMap={guessMap} onSave={onSaveGuess} savedId={savedId}/>}
      {tab==="palpites" && <MyPage matches={matches} now={now} me={me} guessMap={guessMap} participants={participants}
        specialMap={specialMap} official={official} onSave={onSaveGuess} onSaveSpecial={onSaveSpecial} savedId={savedId}/>}
      {tab==="ranking" && <Ranking ranking={ranking} me={me} matches={matches} now={now}
        guessMap={guessMap} specialMap={specialMap} official={official}/>}
      {tab==="especiais" && <SpecialsBoard participants={participants} specialMap={specialMap}
        matches={matches} now={now} me={me} isAdmin={isAdmin} official={official} onAdminSaveSpecial={onAdminSaveSpecial}/>}
      {tab==="regras" && <Regras/>}
      {tab==="admin" && isAdmin && <Admin matches={matches} official={official} participants={participants}
        guessMap={guessMap} specialMap={specialMap} now={now} onSaveGuessFor={onAdminSaveGuess}
        onImport={onImport} onSaveMatch={onSaveMatch} onDeleteMatch={onDeleteMatch} onSaveResult={onSaveResult} onSaveOfficial={onSaveOfficial}/>}

      <div style={{textAlign:"center",color:"var(--muted-2)",fontSize:"12px",padding:"26px 0 34px"}}>BROS<span style={{color:"var(--redlao)"}}>.lão</span> · {BUILD}</div>
      <Toast msg={toast}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
